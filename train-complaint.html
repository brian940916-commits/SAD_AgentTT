<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent TT — 客訴服務</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    body { background: var(--color-bg); }

    .page-header { padding: var(--space-xl) 0 var(--space-md); border-bottom: 1px solid var(--color-border-light); margin-bottom: 0; }
    .page-header h1 { font-size: 24px; font-weight: 700; color: var(--color-text-main); }

    /* ── 主 Tab ── */
    .main-tabs { display: flex; border-bottom: 2px solid var(--color-border-light); margin-bottom: 28px; }
    .main-tab {
      padding: 12px 24px; font-size: 14px; font-weight: 600;
      color: var(--color-text-light); border: none; background: none;
      font-family: var(--font-main); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .main-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .main-tab:hover:not(.active) { color: var(--color-text-sub); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ══════════════════════ 客訴諮詢（AI Chat） ══════════════════════ */
    .chat-wrap { max-width: 720px; }
    .chat-container {
      background: #fff;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 560px;
    }
    .chat-header {
      background: var(--color-primary);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #FAF6EC;
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 14px; font-weight: 600; }
    .chat-header-status { font-size: 11px; opacity: .65; display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #6EDA82; }
    .status-dot.human { background: #E8C547; }
    .chat-header-actions { display: flex; gap: 8px; }
    .chat-action-btn {
      padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
      font-family: var(--font-main); cursor: pointer; border: none; transition: all .15s;
    }
    .btn-transfer { background: rgba(255,255,255,0.15); color: #FAF6EC; }
    .btn-transfer:hover { background: rgba(255,255,255,0.25); }

    /* 聊天訊息區 */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg-row {
      display: flex; gap: 10px; align-items: flex-end;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .msg-avatar.ai    { background: var(--color-primary); color: #FAF6EC; font-size: 12px; }
    .msg-avatar.human { background: #E8C547; color: var(--color-primary); font-size: 16px; }
    .msg-avatar.user  { background: var(--color-accent-red); color: #fff; font-size: 12px; }
    .msg-bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.7;
    }
    .msg-bubble.ai    { background: #F3F3F3; color: var(--color-text-main); border-radius: 4px 12px 12px 12px; }
    .msg-bubble.human { background: #FFF8E6; color: #5A3A0A; border: 1px solid #E8C547; border-radius: 4px 12px 12px 12px; }
    .msg-bubble.user  { background: var(--color-primary); color: #FAF6EC; border-radius: 12px 4px 12px 12px; }
    .msg-time { font-size: 10px; color: var(--color-text-light); margin-top: 2px; text-align: right; }

    /* 快速分類按鈕 */
    .quick-btns {
      padding: 12px 16px;
      border-top: 1px solid var(--color-border-light);
      display: flex; flex-wrap: wrap; gap: 6px;
      background: #FAFAFA;
      flex-shrink: 0;
    }
    .quick-btn {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--color-border);
      background: #fff; color: var(--color-text-sub); font-family: var(--font-main);
      transition: all .15s;
    }
    .quick-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: #E8F4ED; }

    /* 輸入區 */
    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--color-border-light);
      display: flex; gap: 8px;
      background: #fff;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1; padding: 9px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md); font-size: 14px;
      font-family: var(--font-main); outline: none;
      transition: border-color .15s;
    }
    .chat-input:focus { border-color: var(--color-primary); }
    .chat-send-btn {
      padding: 9px 18px; background: var(--color-primary); color: #fff;
      border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 600;
      font-family: var(--font-main); cursor: pointer; transition: background .15s;
    }
    .chat-send-btn:hover { background: var(--color-primary-dark); }

    /* ══════════════════════ 提交客訴 ══════════════════════ */
    .complaint-wrap { max-width: 640px; }
    .section-card { background: #fff; border: 1px solid var(--color-border-light); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; }
    .section-card-title { font-size: 15px; font-weight: 700; color: var(--color-text-main); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

    .upload-zone {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      color: var(--color-text-light);
      font-size: 13px;
      transition: border-color .15s;
    }
    .upload-zone:hover { border-color: var(--color-primary); color: var(--color-primary); }

    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--color-accent-red); color: #fff;
      border: none; border-radius: var(--radius-md);
      font-size: 15px; font-weight: 600; font-family: var(--font-main);
      cursor: pointer; letter-spacing: 1px; transition: background .15s;
    }
    .submit-btn:hover { background: #B04540; }

    /* 成功畫面 */
    .complaint-success {
      display: none;
      background: var(--color-success);
      border: 1px solid #B8DDCA;
      border-radius: var(--radius-lg);
      padding: 28px;
      text-align: center;
    }
    .complaint-success .icon { font-size: 40px; margin-bottom: 12px; }
    .complaint-success-title { font-size: 18px; font-weight: 700; color: var(--color-success-text); margin-bottom: 8px; }
    .case-no-box { background: #fff; border: 1px dashed #B8DDCA; border-radius: var(--radius-md); padding: 10px 20px; display: inline-block; margin: 10px auto 16px; font-size: 13px; color: var(--color-success-text); }
    .case-no-box strong { font-size: 16px; letter-spacing: 1px; display: block; margin-top: 2px; }

    /* ══════════════════════ 案件追蹤 ══════════════════════ */
    .track-wrap { max-width: 720px; }
    .complaint-track-card {
      background: #fff;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .track-card-header {
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--color-border-light);
    }
    .track-card-title { font-size: 14px; font-weight: 700; color: var(--color-text-main); }
    .track-card-meta  { font-size: 12px; color: var(--color-text-light); margin-top: 2px; }
    .track-status-badge {
      font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    }
    .status-pending { background: #FFF8E6; color: #7A5A1A; }
    .status-active  { background: var(--color-success); color: var(--color-success-text); }
    .status-closed  { background: #EEE; color: #757575; }

    /* 時間軸 */
    .timeline { padding: 16px 20px; }
    .timeline-step {
      display: flex; gap: 14px; margin-bottom: 18px;
    }
    .timeline-step:last-child { margin-bottom: 0; }
    .timeline-icon-col { display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0; }
    .timeline-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; border: 2px solid;
    }
    .dot-done    { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
    .dot-active  { background: #FFF8E6; border-color: #E8C547; color: #7A5A1A; }
    .dot-pending { background: #F5F5F5; border-color: #E0E0E0; color: #BDBDBD; }
    .timeline-line { width: 2px; flex: 1; background: var(--color-border-light); margin: 2px 0; min-height: 20px; }
    .timeline-line.done { background: var(--color-primary); }
    .timeline-info { padding-top: 4px; }
    .timeline-step-title { font-size: 13px; font-weight: 600; color: var(--color-text-main); margin-bottom: 2px; }
    .timeline-step-time  { font-size: 11px; color: var(--color-text-light); }
    .timeline-step-desc  { font-size: 12px; color: var(--color-text-sub); margin-top: 4px; line-height: 1.7; }

    .empty-track { text-align: center; padding: 48px 20px; color: var(--color-text-light); }
    .empty-track .icon { font-size: 40px; margin-bottom: 12px; }  </style>
</head>
<body>
<div id="navbar-container"></div>

<main>
  <div class="page-container">
    <div class="page-header">
      <h1>💬 客訴服務</h1>
    </div>

    <div style="padding-top:20px;padding-bottom:60px;">
      <!-- 主 Tab -->
      <div class="main-tabs" role="tablist">
        <button class="main-tab active" onclick="showTab('ai',this)"    role="tab">客訴諮詢 AI</button>
        <button class="main-tab"        onclick="showTab('form',this)"  role="tab">提交客訴</button>
        <button class="main-tab"        onclick="showTab('track',this)" role="tab">案件追蹤</button>
      </div>

      <!-- ═══ AI 諮詢 Tab ═══ -->
      <div class="tab-pane active" id="tab-ai">
        <div class="chat-wrap">
          <div class="chat-container">

            <!-- 標題列 -->
            <div class="chat-header">
              <div class="chat-avatar" id="chat-avatar">🤖</div>
              <div class="chat-header-info">
                <div class="chat-header-name" id="chat-agent-name">Agent TT AI 客服</div>
                <div class="chat-header-status">
                  <div class="status-dot" id="status-dot"></div>
                  <span id="status-text">線上中</span>
                </div>
              </div>
              <div class="chat-header-actions">
                <button class="chat-action-btn btn-transfer" id="transfer-btn" onclick="transferToHuman()">
                  轉接人工客服
                </button>
              </div>
            </div>

            <!-- 訊息列表 -->
            <div class="chat-messages" id="chat-messages"></div>

            <!-- 快速分類按鈕 -->
            <div class="quick-btns" id="quick-btns">
              <button class="quick-btn" onclick="askQuick('訂票問題')">🎫 訂票問題</button>
              <button class="quick-btn" onclick="askQuick('退改票問題')">↩️ 退改票</button>
              <button class="quick-btn" onclick="askQuick('延誤補償')">⏰ 延誤補償</button>
              <button class="quick-btn" onclick="askQuick('付款問題')">💳 付款問題</button>
              <button class="quick-btn" onclick="askQuick('QR Code 問題')">📱 QR Code</button>
              <button class="quick-btn" onclick="askQuick('其他問題')">❓ 其他問題</button>
            </div>

            <!-- 輸入區 -->
            <div class="chat-input-area">
              <input class="chat-input" id="chat-input" placeholder="輸入問題，按 Enter 送出…" onkeydown="onChatKey(event)"/>
              <button class="chat-send-btn" onclick="sendUserMsg()">送出</button>
            </div>

          </div>
        </div>
      </div>

      <!-- ═══ 提交客訴 Tab ═══ -->
      <div class="tab-pane" id="tab-form">
        <div class="complaint-wrap">
          <div class="section-card" id="complaint-form-card">
            <div class="section-card-title">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              填寫客訴表單
            </div>

            <div style="margin-bottom:14px;">
              <label class="form-label">客訴類型 *</label>
              <select class="form-select" id="c-type">
                <option value="">請選擇</option>
                <option value="訂票問題">訂票問題</option>
                <option value="退改票問題">退改票問題</option>
                <option value="延誤補償">延誤補償申請</option>
                <option value="付款問題">付款問題</option>
                <option value="QR Code 問題">QR Code 問題</option>
                <option value="服務態度">服務態度</option>
                <option value="其他">其他</option>
              </select>
            </div>

            <div style="margin-bottom:14px;">
              <label class="form-label">相關訂單編號</label>
              <input class="form-input" id="c-order" placeholder="TK-YYYYMMDD-XXXX（選填）"/>
            </div>

            <div style="margin-bottom:14px;">
              <label class="form-label">問題描述 *</label>
              <textarea class="form-textarea" id="c-desc" rows="5" placeholder="請詳細描述您遇到的問題，包含發生時間、車次、相關資訊等…" style="resize:vertical;"></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
              <div>
                <label class="form-label">聯絡方式 *</label>
                <input class="form-input" id="c-contact" placeholder="手機或 Email"/>
              </div>
              <div>
                <label class="form-label">希望聯絡時間</label>
                <input class="form-input" id="c-time" placeholder="例：工作日 10:00–18:00"/>
              </div>
            </div>

            <div style="margin-bottom:20px;">
              <label class="form-label">附件截圖（選填）</label>
              <div class="upload-zone" onclick="fakeUpload()">
                <div style="font-size:24px;margin-bottom:6px;">📎</div>
                點擊上傳截圖或相關文件
                <div id="upload-hint" style="font-size:12px;margin-top:4px;color:var(--color-text-light);">支援 JPG / PNG / PDF，最大 5MB</div>
              </div>
            </div>

            <div id="form-error" style="display:none;background:var(--color-danger);border:1px solid #E8A8A5;border-radius:var(--radius-md);padding:10px 14px;font-size:13px;color:var(--color-danger-text);margin-bottom:12px;"></div>

            <button class="submit-btn" onclick="submitComplaint()">送出客訴</button>
          </div>

          <!-- 成功畫面 -->
          <div class="complaint-success" id="complaint-success">
            <div class="icon">✅</div>
            <div class="complaint-success-title">客訴已送出！</div>
            <div style="font-size:13px;color:var(--color-success-text);margin-bottom:12px;">我們將於 1–2 個工作日內與您聯絡</div>
            <div class="case-no-box">
              案件編號
              <strong id="case-no-display">—</strong>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;">
              <button onclick="showTab('track', document.querySelectorAll('.main-tab')[2])" style="padding:9px 20px;background:var(--color-primary);color:#fff;border:none;border-radius:var(--radius-md);font-size:13px;font-weight:600;font-family:var(--font-main);cursor:pointer;">查看案件進度</button>
              <button onclick="resetForm()" style="padding:9px 20px;background:#fff;border:1px solid #B8DDCA;color:var(--color-success-text);border-radius:var(--radius-md);font-size:13px;font-weight:600;font-family:var(--font-main);cursor:pointer;">再次提交</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ 案件追蹤 Tab ═══ -->
      <div class="tab-pane" id="tab-track">
        <div class="track-wrap">
          <div id="track-list">
            <div class="empty-track"><div class="icon">📋</div>載入中…</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="footer-container"></div>
<script src="shared-data.js"></script>
<script src="shared-chat.js"></script>
<script src="shared-nav.js"></script>
<script>
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pad2(n) { return String(n).padStart(2,'0'); }
function nowStr() {
  const d = new Date();
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

/* ── Tab ── */
function showTab(id, el) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  if (id === 'track') renderTrackList();
}

/* ══════════════════════ AI 諮詢 ══════════════════════ */
let isHumanMode = false;

/* 硬編碼 AI 回覆 */
const AI_ANSWERS = {
  '訂票問題': `您好！關於訂票問題，以下是常見解答：\n\n• **無法訂票**：請確認您已登入，且票種資格符合（學生票需學生身分）。\n• **訂票後無記錄**：請至「我的票券」頁面查詢，或清除瀏覽器快取後重試。\n• **訂票時間限制**：部分特定席次需提前 30 天購買。\n\n如問題仍未解決，請點擊「轉接人工客服」或至「提交客訴」填寫詳細情況。`,

  '退改票問題': `關於退改票，以下是重要說明：\n\n**退票手續費：**\n• 距發車 25 天以上：1% 手續費\n• 距發車 3–24 天：3% 手續費\n• 距發車 1–2 天：5% 手續費\n• 發車當天：10% 手續費\n\n**改票限制：**\n• 每張票僅限改票 1 次\n• 須於發車前 1 小時申請\n\n退改票請至「退改票申請」頁面操作。`,

  '延誤補償': `延誤補償說明：\n\n• **30 分鐘內**：不予補償\n• **30–60 分鐘**：退回票價 50% 點數\n• **60 分鐘以上**：退回票價全額點數\n• **取消班次**：全額退款 + NT$50 補貼\n\n補償申請請於延誤發生後 30 天內提出。點數退回後可用於下次購票折抵。\n\n如需申請，請至「提交客訴」選擇「延誤補償申請」類型。`,

  '付款問題': `關於付款問題：\n\n• **信用卡被拒**：請確認卡號、有效期及 CVV 正確，或嘗試其他付款方式。\n• **重複扣款**：請提供訂單編號，我們將於 3 個工作天核查並處理。\n• **付款後無確認信**：請檢查垃圾郵件匣，或至「我的票券」確認是否已成功訂購。\n• **退款未到帳**：退款需 3–5 個工作天，超過請提供訂單編號聯絡我們。`,

  'QR Code 問題': `關於 QR Code 問題：\n\n• **無法掃描**：請確保螢幕亮度足夠，或嘗試截圖列印後使用。\n• **QR Code 失效**：每張票的 QR Code 使用一次即失效，請確認是否已使用。\n• **找不到 QR Code**：請至「我的票券」頁面，點選對應票券的「顯示 QR Code」。\n• **進站被拒**：請確認乘車日期、車站及票種是否正確。`,

  '其他問題': `感謝您聯繫 Agent TT 客服！\n\n如果您的問題不屬於上述類別，請描述您的具體問題，我們的 AI 將盡力協助。\n\n若問題較為複雜，建議您：\n1. 點擊「轉接人工客服」與真人客服對話\n2. 至「提交客訴」頁面填寫詳細問題\n\n我們的服務時間為週一至週五 09:00–18:00。`,
};

function initChat() {
  addAIMsg('您好！我是 Agent TT AI 客服 🤖\n\n請問有什麼可以幫您的？您可以直接輸入問題，或點選下方快速分類按鈕。');
}

function addAIMsg(text) {
  const isHuman = isHumanMode;
  const avatar = isHuman ? '👤' : '🤖';
  const avatarCls = isHuman ? 'human' : 'ai';
  const bubbleCls = isHuman ? 'human' : 'ai';
  appendMsg(avatar, avatarCls, text, bubbleCls, false);
}

function addUserMsg(text) {
  const user = getCurrentUser();
  const initial = user ? user.name.charAt(0) : '我';
  appendMsg(initial, 'user', text, 'user', true);
}

function appendMsg(avatar, avatarCls, text, bubbleCls, isUser) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg-row${isUser ? ' user' : ''}`;

  // 換行 → <br>，粗體 **text** → <strong>
  const formatted = escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  div.innerHTML = `
    <div class="msg-avatar ${avatarCls}">${escHtml(avatar)}</div>
    <div>
      <div class="msg-bubble ${bubbleCls}">${formatted}</div>
      <div class="msg-time">${nowStr()}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function onChatKey(e) {
  if (e.key === 'Enter') sendUserMsg();
}

function sendUserMsg() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;
  addUserMsg(text);
  input.value = '';

  if (isHumanMode) {
    setTimeout(() => {
      addAIMsg('謝謝您的訊息，人工客服正在為您處理，請稍候…');
    }, 800);
    return;
  }

  // 簡單關鍵字比對
  const lower = text.toLowerCase();
  let key = '其他問題';
  if (lower.includes('訂票') || lower.includes('買票') || lower.includes('購票')) key = '訂票問題';
  else if (lower.includes('退票') || lower.includes('改票') || lower.includes('退款') || lower.includes('refund')) key = '退改票問題';
  else if (lower.includes('延誤') || lower.includes('誤點') || lower.includes('補償')) key = '延誤補償';
  else if (lower.includes('付款') || lower.includes('扣款') || lower.includes('付費') || lower.includes('信用卡')) key = '付款問題';
  else if (lower.includes('qr') || lower.includes('掃') || lower.includes('二維碼')) key = 'QR Code 問題';

  setTimeout(() => addAIMsg(AI_ANSWERS[key] || AI_ANSWERS['其他問題']), 600 + Math.random() * 400);
}

function askQuick(category) {
  addUserMsg(category);
  setTimeout(() => addAIMsg(AI_ANSWERS[category] || AI_ANSWERS['其他問題']), 600);
}

function transferToHuman() {
  isHumanMode = true;
  document.getElementById('chat-avatar').textContent = '👤';
  document.getElementById('chat-agent-name').textContent = '人工客服';
  document.getElementById('status-dot').classList.add('human');
  document.getElementById('status-text').textContent = '人工客服中';
  document.getElementById('transfer-btn').textContent = '✓ 已轉接';
  document.getElementById('transfer-btn').disabled = true;
  document.getElementById('quick-btns').style.display = 'none';
  addAIMsg('您好，我是 Agent TT 人工客服 👤\n\n感謝您的等候，請問有什麼可以協助您的？\n（服務時間：週一至週五 09:00–18:00）');
}

/* ══════════════════════ 提交客訴 ══════════════════════ */
function fakeUpload() {
  document.getElementById('upload-hint').textContent = '✓ 已選擇：screenshot.png（模擬）';
  document.getElementById('upload-hint').style.color = 'var(--color-primary)';
}

function submitComplaint() {
  const type    = document.getElementById('c-type').value;
  const desc    = document.getElementById('c-desc').value.trim();
  const contact = document.getElementById('c-contact').value.trim();
  const errEl   = document.getElementById('form-error');

  if (!type || !desc || !contact) {
    errEl.textContent = '請填寫客訴類型、問題描述與聯絡方式';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const user = getCurrentUser();
  const now  = new Date();
  const caseNo = 'CS-' + now.getFullYear() + pad2(now.getMonth()+1) + pad2(now.getDate()) + '-' + Math.floor(Math.random()*9000+1000);

  const complaint = {
    id:          generateId(),
    userId:      user ? user.id : '',
    userName:    user ? user.name : '訪客',
    title:       type,
    type,
    orderId:     document.getElementById('c-order').value.trim(),
    description: desc,
    contact,
    status:      'pending',
    messages:    [],
    createdAt:   now.toISOString(),
    closedAt:    null,
    caseNo,
  };
  saveComplaint(complaint);

  document.getElementById('complaint-form-card').style.display = 'none';
  document.getElementById('case-no-display').textContent = caseNo;
  document.getElementById('complaint-success').style.display = 'block';
}

function resetForm() {
  document.getElementById('c-type').value    = '';
  document.getElementById('c-order').value   = '';
  document.getElementById('c-desc').value    = '';
  document.getElementById('c-contact').value = '';
  document.getElementById('c-time').value    = '';
  document.getElementById('upload-hint').textContent = '支援 JPG / PNG / PDF，最大 5MB';
  document.getElementById('upload-hint').style.color = '';
  document.getElementById('complaint-form-card').style.display = 'block';
  document.getElementById('complaint-success').style.display = 'none';
}

/* ══════════════════════ 案件追蹤 ══════════════════════ */
function renderTrackList() {
  const user = getCurrentUser();
  const list = document.getElementById('track-list');
  if (!user) { list.innerHTML = '<div class="empty-track"><div class="icon">🔐</div>請先登入</div>'; return; }

  const complaints = getComplaints().filter(c => c.userId === user.id);
  complaints.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  if (!complaints.length) {
    list.innerHTML = '<div class="empty-track"><div class="icon">📋</div><div style="font-size:15px;font-weight:600;color:#6B6354;margin-bottom:6px;">目前沒有客訴案件</div><div style="font-size:13px;">如有問題，請至「提交客訴」頁面填寫。</div></div>';
    return;
  }
  list.innerHTML = complaints.map(c => trackCardHTML(c)).join('');
}

function trackCardHTML(c) {
  const STATUS_MAP = { pending:'待處理', active:'處理中', closed:'已結案' };
  const STATUS_CLS = { pending:'status-pending', active:'status-active', closed:'status-closed' };
  const steps = getTimelineSteps(c);
  const stepsHTML = steps.map((s, i) => {
    const isLast = i === steps.length - 1;
    return `
      <div class="timeline-step">
        <div class="timeline-icon-col">
          <div class="timeline-dot ${s.dotCls}">${s.icon}</div>
          ${!isLast ? `<div class="timeline-line ${s.done ? 'done' : ''}"></div>` : ''}
        </div>
        <div class="timeline-info">
          <div class="timeline-step-title">${escHtml(s.title)}</div>
          <div class="timeline-step-time">${escHtml(s.time)}</div>
          ${s.desc ? `<div class="timeline-step-desc">${escHtml(s.desc)}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="complaint-track-card">
      <div class="track-card-header">
        <div>
          <div class="track-card-title">${escHtml(c.title || c.type)}</div>
          <div class="track-card-meta">
            案件 ${escHtml(c.caseNo || c.id.slice(0,8).toUpperCase())}
            ${c.orderId ? ` ｜ 訂單 ${escHtml(c.orderId)}` : ''}
            ｜ ${escHtml(c.createdAt ? c.createdAt.slice(0,10) : '—')}
          </div>
        </div>
        <span class="track-status-badge ${STATUS_CLS[c.status] || 'status-pending'}">${STATUS_MAP[c.status] || c.status}</span>
      </div>
      <div class="timeline">${stepsHTML}</div>
    </div>`;
}

function getTimelineSteps(c) {
  const created = c.createdAt ? c.createdAt.slice(0,16).replace('T',' ') : '—';
  const isActive = c.status === 'active' || c.status === 'closed';
  const isClosed = c.status === 'closed';

  // 模擬時間：每個階段加30分鐘
  function addMins(isoStr, mins) {
    if (!isoStr) return '—';
    const d = new Date(new Date(isoStr).getTime() + mins * 60000);
    return d.toISOString().slice(0,16).replace('T',' ');
  }

  return [
    {
      title: '受理案件', done: true,
      dotCls: 'dot-done', icon: '✓',
      time: created,
      desc: '您的客訴已成功提交，案件編號已產生。',
    },
    {
      title: 'AI 初步處理', done: true,
      dotCls: 'dot-done', icon: '🤖',
      time: addMins(c.createdAt, 5),
      desc: 'AI 系統已分析您的問題並進行初步分類。',
    },
    {
      title: '人工審核中', done: isActive,
      dotCls: isActive ? 'dot-done' : 'dot-active',
      icon: isActive ? '✓' : '👤',
      time: isActive ? addMins(c.createdAt, 30) : '等待中',
      desc: isActive ? '客服人員已接手處理您的案件。' : '即將由客服人員跟進。',
    },
    {
      title: '案件結案', done: isClosed,
      dotCls: isClosed ? 'dot-done' : 'dot-pending',
      icon: isClosed ? '✓' : '—',
      time: isClosed ? (c.closedAt ? c.closedAt.slice(0,16).replace('T',' ') : addMins(c.createdAt, 480)) : '待完成',
      desc: isClosed ? '案件已結案，感謝您的耐心等候。' : '',
    },
  ];
}

  renderNav();

  initChat();
