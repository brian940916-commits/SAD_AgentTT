<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent TT — 我的訂單</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    .page-header {
      padding: var(--space-xl) 0 var(--space-md);
      border-bottom: 1px solid var(--color-border-light);
      margin-bottom: var(--space-xl);
    }
    .page-header h1 { font-size: 24px; font-weight: 700; color: var(--color-text-main); }
    .content-area   { padding-bottom: var(--space-3xl); }

    /* ── 篩選 Tab ── */
    .filter-tabs {
      display: flex; gap: 4px; margin-bottom: var(--space-xl);
      background: #fff; border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg); padding: 4px; width: fit-content;
    }
    .filter-tab {
      padding: 7px 18px; border-radius: var(--radius-md);
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; background: none; font-family: var(--font-main);
      color: var(--color-text-sub); transition: all .15s;
    }
    .filter-tab.active { background: var(--color-primary); color: #fff; }
    .filter-tab:hover:not(.active) { background: var(--color-secondary); }

    /* ── 訂單卡片 ── */
    .order-card {
      background: #fff; border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg); overflow: hidden;
      margin-bottom: var(--space-md); transition: box-shadow .15s;
    }
    .order-card:hover { box-shadow: var(--shadow-card); }
    .order-card-body {
      display: flex; gap: var(--space-md); padding: var(--space-md);
    }
    .order-thumb {
      width: 100px; height: 88px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; flex-shrink: 0;
    }
    .order-info { flex: 1; min-width: 0; }
    .order-name-row {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: var(--space-sm);
      margin-bottom: 6px;
    }
    .order-name  { font-size: 16px; font-weight: 700; color: var(--color-text-main); }
    .order-meta  { font-size: 13px; color: var(--color-text-sub); line-height: 1.8; }
    .order-price { font-size: 18px; font-weight: 700; color: var(--color-primary); text-align: right; white-space: nowrap; }
    .order-price small { font-size: 12px; font-weight: 400; color: var(--color-text-sub); }

    /* 狀態標籤 */
    .status-badge {
      font-size: 12px; font-weight: 600; padding: 3px 10px;
      border-radius: var(--radius-xl); white-space: nowrap; flex-shrink: 0;
    }
    .status-paid      { background: var(--color-success);  color: var(--color-success-text); }
    .status-pending   { background: var(--color-warning);  color: var(--color-warning-text); }
    .status-completed { background: #E3F2FD; color: #1565C0; }
    .status-cancelled { background: var(--color-danger);   color: var(--color-danger-text); }

    /* 訂單底部操作列 */
    .order-card-foot {
      padding: 10px var(--space-md);
      background: var(--color-secondary);
      border-top: 1px solid var(--color-border-light);
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: var(--space-sm);
    }
    .order-id-text { font-size: 12px; color: var(--color-text-light); }
    .order-actions { display: flex; gap: var(--space-sm); }

    /* 空狀態 */
    .empty-state { text-align: center; padding: var(--space-3xl) var(--space-xl); color: var(--color-text-light); }
    .empty-icon  { font-size: 52px; margin-bottom: var(--space-md); }

    /* ── Modal 共用 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 500; display: none;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: var(--radius-xl);
      width: 90%; max-width: 520px; max-height: 90vh;
      overflow-y: auto; box-shadow: var(--shadow-modal);
    }
    .modal-head {
      padding: var(--space-lg); border-bottom: 1px solid var(--color-border-light);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 18px; font-weight: 700; color: var(--color-text-main); }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--color-text-sub); }
    .modal-body  { padding: var(--space-lg); }
    .modal-foot  { padding: var(--space-md) var(--space-lg); border-top: 1px solid var(--color-border-light); display: flex; gap: var(--space-sm); justify-content: flex-end; }

    /* ── 取消 Modal ── */
    .cancel-rule-box {
      background: var(--color-secondary); border-radius: var(--radius-md);
      padding: var(--space-md); margin-bottom: var(--space-md);
    }
    .cancel-rule-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .cancel-rule-table th { text-align: left; color: var(--color-text-sub); font-weight: 600; padding: 4px 8px; border-bottom: 1px solid var(--color-border-light); }
    .cancel-rule-table td { padding: 6px 8px; border-bottom: 1px solid #f0ede5; }
    .cancel-rule-table tr:last-child td { border-bottom: none; }
    .cancel-rule-table td:last-child { font-weight: 600; }
    .highlight-row td { color: var(--color-primary); background: #f0f7f4; }
    .refund-result {
      border-radius: var(--radius-md); padding: var(--space-md);
      margin-top: var(--space-md); text-align: center;
    }
    .refund-amount { font-size: 28px; font-weight: 700; margin: 6px 0; }
    .refund-label  { font-size: 13px; }

    /* ── 評價 Modal ── */
    .star-row { display: flex; gap: 6px; margin: var(--space-md) 0; }
    .star-btn {
      font-size: 34px; cursor: pointer; color: #d0cbb8;
      border: none; background: none; padding: 0;
      transition: color .1s, transform .1s;
    }
    .star-btn.filled       { color: var(--color-accent-yellow); }
    .star-btn:hover        { transform: scale(1.15); }
    .star-label { font-size: 13px; color: var(--color-text-sub); margin-left: 8px; align-self: center; }

    .photo-upload-area {
      border: 2px dashed var(--color-border); border-radius: var(--radius-md);
      padding: var(--space-lg); text-align: center; cursor: pointer;
      transition: border-color .15s; margin-top: var(--space-sm);
    }
    .photo-upload-area:hover { border-color: var(--color-primary); }
    .photo-upload-area p { font-size: 13px; color: var(--color-text-sub); margin: 0; }
    .photo-preview-row { display: flex; gap: var(--space-sm); flex-wrap: wrap; margin-top: var(--space-sm); }
    .photo-preview-thumb {
      width: 80px; height: 80px; object-fit: cover;
      border-radius: var(--radius-md); border: 2px solid var(--color-border-light);
    }

    /* Toast */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #2C4A3E; color: #fff; padding: 10px 24px; border-radius: var(--radius-xl); font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 9999; }
    .toast.show { opacity: 1; }  </style>
</head>
<body>
<div id="navbar-container"></div>

<div id="app">
  <div class="page-container">
    <div class="page-header">
      <div class="breadcrumb" style="margin-bottom:8px;">
        <div class="breadcrumb-item"><a href="index.html">首頁</a></div>
        <span class="breadcrumb-sep">›</span>
        <div class="breadcrumb-item current">我的訂單</div>
      </div>
      <h1>我的訂單</h1>
    </div>

    <div class="content-area">
      <!-- 篩選 Tab -->
      <div class="filter-tabs" role="tablist">
        <button class="filter-tab active" role="tab" data-filter="all"       onclick="setFilter('all')">全部</button>
        <button class="filter-tab"        role="tab" data-filter="paid"      onclick="setFilter('paid')">已付款</button>
        <button class="filter-tab"        role="tab" data-filter="pending"   onclick="setFilter('pending')">待付款</button>
        <button class="filter-tab"        role="tab" data-filter="completed" onclick="setFilter('completed')">已完成</button>
        <button class="filter-tab"        role="tab" data-filter="cancelled" onclick="setFilter('cancelled')">已取消</button>
      </div>

      <!-- 訂單列表 -->
      <div id="orders-list"><!-- 動態填入 --></div>
    </div>
  </div>
</div>

<!-- ── 取消訂單 Modal ── -->
<div class="modal-overlay" id="cancel-modal" role="dialog" aria-modal="true" aria-label="申請取消">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">申請取消訂房</div>
      <button class="modal-close" onclick="closeCancel()" aria-label="關閉">✕</button>
    </div>
    <div class="modal-body">
      <div id="cancel-booking-info" style="margin-bottom:var(--space-md);"></div>
      <div class="cancel-rule-box">
        <div style="font-size:13px;font-weight:600;margin-bottom:var(--space-sm);color:var(--color-text-main);">退款規則</div>
        <table class="cancel-rule-table" id="cancel-rule-table">
          <thead>
            <tr>
              <th>距入住天數</th>
              <th>退款比例</th>
              <th>退款金額</th>
            </tr>
          </thead>
          <tbody id="cancel-rule-body"><!-- 動態填入 --></tbody>
        </table>
      </div>
      <div class="refund-result" id="refund-result"><!-- 動態填入 --></div>
      <div class="alert-warning" style="margin-top:var(--space-md);" id="no-refund-warning" style="display:none;"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeCancel()">保留訂房</button>
      <button class="btn btn-danger" id="confirm-cancel-btn" onclick="confirmCancel()">確認取消</button>
    </div>
  </div>
</div>

<!-- ── 撰寫評價 Modal ── -->
<div class="modal-overlay" id="review-modal" role="dialog" aria-modal="true" aria-label="撰寫評價">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">✍️ 撰寫評價</div>
      <button class="modal-close" onclick="closeReview()" aria-label="關閉">✕</button>
    </div>
    <div class="modal-body">
      <div id="review-booking-info" style="margin-bottom:var(--space-md);"></div>

      <!-- 星星評分 -->
      <div style="font-size:14px;font-weight:600;color:var(--color-text-main);margin-bottom:4px;">整體評分 <span style="color:var(--color-accent-red);">*</span></div>
      <div style="display:flex;align-items:center;">
        <div class="star-row" id="star-row" role="group" aria-label="星星評分">
          <button class="star-btn" data-n="1" onclick="setRating(1)" aria-label="1 顆星">★</button>
          <button class="star-btn" data-n="2" onclick="setRating(2)" aria-label="2 顆星">★</button>
          <button class="star-btn" data-n="3" onclick="setRating(3)" aria-label="3 顆星">★</button>
          <button class="star-btn" data-n="4" onclick="setRating(4)" aria-label="4 顆星">★</button>
          <button class="star-btn" data-n="5" onclick="setRating(5)" aria-label="5 顆星">★</button>
        </div>
        <span class="star-label" id="star-label">請選擇星數</span>
      </div>
      <div class="error-msg" id="err-rating" style="display:none;color:var(--color-accent-red);font-size:12px;margin-top:4px;">請給予星星評分</div>

      <!-- 評價內容 -->
      <div class="form-group" style="margin-top:var(--space-md);">
        <label class="form-label" for="review-text">評價內容 <span style="color:var(--color-accent-red);">*</span></label>
        <textarea class="form-input" id="review-text" rows="4" placeholder="分享您的住宿體驗，讓其他旅客參考（至少 10 個字）…"></textarea>
        <div class="error-msg" id="err-review" style="display:none;color:var(--color-accent-red);font-size:12px;margin-top:4px;">評價內容至少需要 10 個字</div>
      </div>

      <!-- 照片上傳 -->
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">上傳照片（選填，最多 4 張）</label>
        <label for="review-photos" class="photo-upload-area">
          <div style="font-size:32px;margin-bottom:6px;">📷</div>
          <p>點擊選擇或拖曳照片到此處</p>
          <p style="font-size:11px;color:var(--color-text-light);margin-top:4px;">支援 JPG、PNG，每張不超過 5MB</p>
        </label>
        <input type="file" id="review-photos" accept="image/*" multiple style="display:none;" onchange="previewPhotos(this)">
        <div class="photo-preview-row" id="photo-preview-row"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeReview()">取消</button>
      <button class="btn btn-primary" onclick="submitReview()">送出評價</button>
    </div>
  </div>
</div>

<!-- ── 聯絡房東 Modal ── -->
<div class="modal-overlay" id="contact-modal" role="dialog" aria-modal="true" aria-label="聯絡房東">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">💬 聯絡房東</div>
      <button class="modal-close" onclick="closeContact()" aria-label="關閉">✕</button>
    </div>
    <div class="modal-body">
      <div id="contact-host-info" style="margin-bottom:var(--space-md);"></div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="contact-msg">訊息內容 <span style="color:var(--color-accent-red);">*</span></label>
        <textarea class="form-input" id="contact-msg" rows="4" placeholder="請輸入您的問題或訊息…"></textarea>
        <div id="contact-err" style="display:none;font-size:12px;color:var(--color-accent-red);margin-top:4px;">請輸入訊息內容</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeContact()">取消</button>
      <button class="btn btn-primary" onclick="submitContact()">送出訊息</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div id="footer-container"></div>

<script src="shared-data.js"></script>
<script src="shared-nav.js"></script>
<script>
  renderNav();
  renderFooter();

  /* ── 頁面保護 ── */
  const currentUser = getCurrentUser();
  if (!currentUser) { window.location.href = 'login.html'; }

  /* ── 工具 ── */
  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg, ms = 2200) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ms);
  }

  /* ── 評價資料 ── */
  const REVIEWS_KEY = 'agenttt_reviews';
  function getReviews() { try { return JSON.parse(localStorage.getItem(REVIEWS_KEY) || '[]'); } catch { return []; } }
  function saveReview(r) { const rs = getReviews(); rs.push(r); localStorage.setItem(REVIEWS_KEY, JSON.stringify(rs)); }
  function hasReviewed(bookingId) { return getReviews().some(r => r.bookingId === bookingId); }

  /* ── 房源展示資料 ── */
  const PROP_THUMB = {
    prop_01: { emoji: '🏡', bg: '#C8E6C9' },
    prop_02: { emoji: '🌲', bg: '#D7CCC8' },
    prop_03: { emoji: '🚂', bg: '#FFCDD2' },
  };
  function thumb(id) { return PROP_THUMB[id] || { emoji: '🏠', bg: '#f0ede5' }; }

  /* ── 狀態設定 ── */
  const STATUS_MAP = {
    paid:      { label: '已付款', cls: 'status-paid' },
    pending:   { label: '待付款', cls: 'status-pending' },
    completed: { label: '已完成', cls: 'status-completed' },
    cancelled: { label: '已取消', cls: 'status-cancelled' },
  };

  const STAR_LABELS = ['', '非常差', '差', '普通', '好', '非常好'];

  /* ── 狀態 ── */
  let activeFilter  = 'all';
  let allBookings   = [];
  let cancelBooking = null;   // 正在取消的訂單
  let reviewBooking = null;   // 正在評價的訂單
  let reviewRating  = 0;

  /* ── 初始化 ── */
  function init() {
    allBookings = getBookingsByUser(currentUser.id)
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    renderList();
  }

  /* ── 篩選 ── */
  function setFilter(filter) {
    activeFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === filter);
    });
    renderList();
  }

  /* ── 訂單列表 ── */
  function renderList() {
    const list = activeFilter === 'all'
      ? allBookings
      : allBookings.filter(b => b.status === activeFilter);

    const el = document.getElementById('orders-list');
    if (!list.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p style="font-size:16px;font-weight:600;margin-bottom:8px;">
            ${activeFilter === 'all' ? '目前沒有訂單' : `沒有「${STATUS_MAP[activeFilter]?.label || activeFilter}」的訂單`}
          </p>
          <p style="margin-bottom:var(--space-xl);">前往房源搜尋，規劃您的下一趟旅程！</p>
          <a href="property-search.html" class="btn btn-primary">搜尋房源</a>
        </div>`;
      return;
    }

    el.innerHTML = list.map(b => renderOrderCard(b)).join('');
  }

  function renderOrderCard(b) {
    const th     = thumb(b.propertyId);
    const st     = STATUS_MAP[b.status] || { label: b.status, cls: '' };
    const today  = new Date(); today.setHours(0,0,0,0);
    const checkIn  = new Date(b.checkIn  + 'T00:00:00');
    const checkOut = new Date(b.checkOut + 'T00:00:00');
    const daysToCheckIn = Math.round((checkIn - today) / 86400000);
    const reviewed = hasReviewed(b.id);

    /* 操作按鈕 */
    let actions = '';
    if (b.status === 'paid' || b.status === 'pending') {
      if (daysToCheckIn > 0) {
        actions += `<button class="btn btn-outline btn-sm" onclick="openCancel('${escHtml(b.id)}')">申請取消</button>`;
      }
    }
    if ((b.status === 'completed' || (b.status === 'paid' && checkOut < today)) && !reviewed) {
      actions += `<button class="btn btn-primary btn-sm" onclick="openReview('${escHtml(b.id)}')">✍️ 撰寫評價</button>`;
    }
    if (reviewed) {
      actions += `<span style="font-size:12px;color:var(--color-success-text);">✅ 已評價</span>`;
    }
    if (b.status !== 'cancelled') {
      actions += `<button class="btn btn-outline btn-sm" onclick="openContact('${escHtml(b.id)}')">💬 聯絡房東</button>`;
    }

    const nights  = b.nights || Math.round((checkOut - checkIn) / 86400000);
    const dateStr = `${b.checkIn} — ${b.checkOut}`;

    return `
      <div class="order-card" id="order-${escHtml(b.id)}">
        <div class="order-card-body">
          <div class="order-thumb" style="background:${th.bg};">${th.emoji}</div>
          <div class="order-info">
            <div class="order-name-row">
              <div class="order-name">${escHtml(b.propertyName)}</div>
              <div>
                <span class="status-badge ${st.cls}">${escHtml(st.label)}</span>
              </div>
            </div>
            <div class="order-meta">
              📅 ${escHtml(dateStr)}（${nights} 晚）<br>
              👥 ${b.guests || 1} 人・📍 ${escHtml(b.guestName || '')}
              ${b.note ? `<br>📝 ${escHtml(b.note)}` : ''}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div class="order-price">NT$ ${(b.totalPrice || 0).toLocaleString()}<br><small>/ 含稅費</small></div>
          </div>
        </div>
        <div class="order-card-foot">
          <span class="order-id-text">訂單編號：${escHtml(b.id)}</span>
          <div class="order-actions">${actions}</div>
        </div>
      </div>`;
  }

  /* ════════════════════════════════
     取消訂單 Modal
  ════════════════════════════════ */
  function openCancel(bookingId) {
    cancelBooking = allBookings.find(b => b.id === bookingId);
    if (!cancelBooking) return;

    const today    = new Date(); today.setHours(0,0,0,0);
    const checkIn  = new Date(cancelBooking.checkIn + 'T00:00:00');
    const days     = Math.round((checkIn - today) / 86400000);
    const total    = cancelBooking.totalPrice || 0;

    /* 退款試算 */
    let refundRate = 0, refundNote = '';
    if      (days >= 10) { refundRate = 1.0; refundNote = '全額退款'; }
    else if (days >= 4)  { refundRate = 0.7; refundNote = '退款 70%（扣除 30% 手續費）'; }
    else                 { refundRate = 0;   refundNote = '距入住不足 3 天，不退款'; }
    const refundAmt = Math.round(total * refundRate);

    /* 訂單資訊 */
    document.getElementById('cancel-booking-info').innerHTML = `
      <div style="background:var(--color-secondary);border-radius:var(--radius-md);padding:var(--space-md);">
        <div style="font-size:15px;font-weight:700;margin-bottom:6px;">${escHtml(cancelBooking.propertyName)}</div>
        <div style="font-size:13px;color:var(--color-text-sub);">
          📅 ${escHtml(cancelBooking.checkIn)} — ${escHtml(cancelBooking.checkOut)}（${cancelBooking.nights} 晚）<br>
          💰 訂單金額：NT$ ${total.toLocaleString()}
          ${days >= 0 ? `・距入住 <strong>${days}</strong> 天` : '・已入住'}
        </div>
      </div>`;

    /* 退款規則表格（highlight 適用規則） */
    const rules = [
      { label: '10 天以上', rate: '100%', apply: days >= 10 },
      { label: '4–9 天',   rate: '70%',  apply: days >= 4 && days < 10 },
      { label: '3 天以內', rate: '不退', apply: days < 4 },
    ];
    document.getElementById('cancel-rule-body').innerHTML = rules.map(r => `
      <tr class="${r.apply ? 'highlight-row' : ''}">
        <td>${r.label}${r.apply ? ' ← 您的情況' : ''}</td>
        <td>${r.rate}</td>
        <td>${r.apply ? (refundAmt > 0 ? `NT$ ${refundAmt.toLocaleString()}` : '不退款') : '—'}</td>
      </tr>`).join('');

    /* 退款結果 */
    const resultEl = document.getElementById('refund-result');
    if (refundRate === 0) {
      resultEl.style.background = '#FBEAEA';
      resultEl.innerHTML = `
        <div class="refund-label" style="color:var(--color-danger-text);">⚠️ 距入住不足 3 天</div>
        <div class="refund-amount" style="color:var(--color-accent-red);">不退款</div>
        <div class="refund-label" style="color:var(--color-danger-text);">取消後將損失全部訂金 NT$ ${total.toLocaleString()}</div>`;
    } else {
      resultEl.style.background = '#E8F4ED';
      resultEl.innerHTML = `
        <div class="refund-label" style="color:var(--color-success-text);">預計退款金額</div>
        <div class="refund-amount" style="color:var(--color-primary);">NT$ ${refundAmt.toLocaleString()}</div>
        <div class="refund-label" style="color:var(--color-success-text);">${refundNote}</div>`;
    }

    document.getElementById('cancel-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeCancel() {
    document.getElementById('cancel-modal').classList.remove('open');
    document.body.style.overflow = '';
    cancelBooking = null;
  }

  function confirmCancel() {
    if (!cancelBooking) return;
    const bookings = getBookings();
    const idx = bookings.findIndex(b => b.id === cancelBooking.id);
    if (idx >= 0) {
      bookings[idx].status     = 'cancelled';
      bookings[idx].cancelledAt = nowISO();
      setData('agenttt_bookings', bookings);
    }
    allBookings = getBookingsByUser(currentUser.id)
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    closeCancel();
    renderList();
    showToast('✅ 訂單已取消，退款將於 5–7 個工作天內退回');
  }

  /* ════════════════════════════════
     撰寫評價 Modal
  ════════════════════════════════ */
  function openReview(bookingId) {
    reviewBooking = allBookings.find(b => b.id === bookingId);
    if (!reviewBooking) return;
    reviewRating = 0;

    document.getElementById('review-booking-info').innerHTML = `
      <div style="background:var(--color-secondary);border-radius:var(--radius-md);padding:var(--space-md);">
        <div style="font-size:15px;font-weight:700;margin-bottom:4px;">${escHtml(reviewBooking.propertyName)}</div>
        <div style="font-size:13px;color:var(--color-text-sub);">
          📅 ${escHtml(reviewBooking.checkIn)} — ${escHtml(reviewBooking.checkOut)}（${reviewBooking.nights} 晚）
        </div>
      </div>`;

    /* 重置評分 */
    setRating(0);
    document.getElementById('review-text').value = '';
    document.getElementById('photo-preview-row').innerHTML = '';
    document.getElementById('err-rating').style.display = 'none';
    document.getElementById('err-review').style.display  = 'none';

    document.getElementById('review-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeReview() {
    document.getElementById('review-modal').classList.remove('open');
    document.body.style.overflow = '';
    reviewBooking = null;
  }

  /* ── 星星評分 ── */
  function setRating(n) {
    reviewRating = n;
    document.querySelectorAll('.star-btn').forEach((el, i) => {
      el.classList.toggle('filled', i < n);
    });
    document.getElementById('star-label').textContent =
      n > 0 ? `${n} 顆星・${STAR_LABELS[n]}` : '請選擇星數';
  }

  /* Hover 效果 */
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
      const n = Number(btn.dataset.n);
      document.querySelectorAll('.star-btn').forEach((el, i) => {
        el.classList.toggle('filled', i < n);
      });
    });
    btn.addEventListener('mouseleave', () => setRating(reviewRating));
  });

  /* ── 照片預覽 ── */
  function previewPhotos(input) {
    const row = document.getElementById('photo-preview-row');
    row.innerHTML = '';
    Array.from(input.files).slice(0, 4).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'photo-preview-thumb';
        img.alt = file.name;
        row.appendChild(img);
      };
      reader.readAsDataURL(file);
    });
  }

  /* ── 送出評價 ── */
  function submitReview() {
    if (!reviewBooking) return;

    const text = document.getElementById('review-text').value.trim();
    let ok = true;

    if (reviewRating === 0) {
      document.getElementById('err-rating').style.display = 'block'; ok = false;
    } else {
      document.getElementById('err-rating').style.display = 'none';
    }
    if (text.length < 10) {
      document.getElementById('err-review').style.display = 'block'; ok = false;
    } else {
      document.getElementById('err-review').style.display = 'none';
    }
    if (!ok) return;

    saveReview({
      id:          generateId(),
      bookingId:   reviewBooking.id,
      propertyId:  reviewBooking.propertyId,
      userId:      currentUser.id,
      userName:    currentUser.name,
      rating:      reviewRating,
      text,
      createdAt:   nowISO(),
    });

    closeReview();
    renderList();
    showToast('🎉 感謝您的評價！');
  }

  init();

  /* ════════════════════════════════
     聯絡房東 Modal
  ════════════════════════════════ */
  let contactBooking = null;

  function openContact(bookingId) {
    contactBooking = allBookings.find(b => b.id === bookingId);
    if (!contactBooking) return;

    const prop = getPropertyById(contactBooking.propertyId);
    const host = prop ? getUserById(prop.hostId) : null;

    document.getElementById('contact-host-info').innerHTML = `
      <div style="background:var(--color-secondary);border-radius:var(--radius-md);padding:var(--space-md);">
        <div style="font-size:15px;font-weight:700;margin-bottom:6px;">${escHtml(contactBooking.propertyName)}</div>
        <div style="font-size:13px;color:var(--color-text-sub);">
          🏡 房東：${host ? escHtml(host.name) : '未知'}<br>
          📅 訂單：${escHtml(contactBooking.checkIn)} — ${escHtml(contactBooking.checkOut)}
        </div>
      </div>`;
    document.getElementById('contact-msg').value = '';
    document.getElementById('contact-err').style.display = 'none';
    document.getElementById('contact-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeContact() {
    document.getElementById('contact-modal').classList.remove('open');
    document.body.style.overflow = '';
    contactBooking = null;
  }

  function submitContact() {
    const msg = document.getElementById('contact-msg').value.trim();
    if (!msg) { document.getElementById('contact-err').style.display = 'block'; return; }
    document.getElementById('contact-err').style.display = 'none';

    const prop = getPropertyById(contactBooking.propertyId);
    const hostId = prop ? prop.hostId : null;
    const convKey = 'agenttt_messages';
    let convs = [];
    try { convs = JSON.parse(localStorage.getItem(convKey) || '[]'); } catch { convs = []; }

    const convId = 'conv_' + contactBooking.id;
    let conv = convs.find(c => c.id === convId);
    if (!conv) {
      conv = {
        id:           convId,
        hostId:       hostId,
        guestId:      currentUser.id,
        guestName:    currentUser.name || currentUser.email,
        propertyId:   contactBooking.propertyId,
        propertyName: contactBooking.propertyName,
        messages:     [],
      };
      convs.push(conv);
    }
    conv.messages.push({ sender: 'guest', text: msg, createdAt: new Date().toISOString() });
    localStorage.setItem(convKey, JSON.stringify(convs));

    closeContact();
    showToast('✅ 訊息已送出，房東將盡快回覆');
  }
</script>
</body>
</html>
