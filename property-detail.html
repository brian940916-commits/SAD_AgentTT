<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent TT — 房源詳情</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    /* ── 麵包屑 ── */
    .page-top { padding: var(--space-md) 0 0; }

    /* ── 標題列 ── */
    .prop-title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: var(--space-md); margin: var(--space-sm) 0 var(--space-md);
      flex-wrap: wrap;
    }
    .prop-main-title { font-size: 26px; font-weight: 700; color: var(--color-text-main); }
    .prop-rating-row { display: flex; align-items: center; gap: var(--space-md); font-size: 14px; flex-wrap: wrap; margin-top: 6px; }
    .rating-stars { color: var(--color-accent-yellow); font-size: 16px; font-weight: 700; }
    .rating-count { color: var(--color-text-sub); }
    .prop-station-tag {
      background: var(--color-success); color: var(--color-success-text);
      font-size: 12px; padding: 3px 10px; border-radius: var(--radius-sm); font-weight: 500;
    }

    /* ── 照片格 ── */
    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 220px 220px;
      gap: 6px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: var(--space-xl);
    }
    .photo-cell {
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; cursor: pointer; position: relative;
      transition: opacity .15s;
    }
    .photo-cell:first-child {
      grid-row: 1 / 3;
      font-size: 80px;
    }
    .photo-cell:hover { opacity: .9; }
    .photo-more {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.45); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; letter-spacing: 1px;
    }

    /* ── 主內容雙欄 ── */
    .detail-grid {
      display: grid; grid-template-columns: 1fr 340px;
      gap: var(--space-xl); align-items: start;
      padding-bottom: var(--space-3xl);
    }

    /* ── 左側區塊 ── */
    .section { margin-bottom: var(--space-xl); }
    .section-head {
      font-size: 18px; font-weight: 700; color: var(--color-text-main);
      padding-bottom: var(--space-sm); border-bottom: 2px solid var(--color-border-light);
      margin-bottom: var(--space-md);
    }
    .desc-text { font-size: 14px; color: var(--color-text-sub); line-height: 1.8; }

    /* 設備 grid */
    .facility-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-sm); }
    .facility-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; padding: 6px 0;
    }
    .facility-item .f-icon { font-size: 15px; width: 20px; text-align: center; }
    .facility-item.no { color: var(--color-text-light); text-decoration: line-through; }

    /* 政策 */
    .policy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); }
    .policy-item { background: var(--color-secondary); border-radius: var(--radius-md); padding: var(--space-md); }
    .policy-label { font-size: 11px; color: var(--color-text-light); font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
    .policy-val   { font-size: 14px; font-weight: 600; color: var(--color-text-main); }
    .cancel-table { font-size: 13px; color: var(--color-text-sub); }
    .cancel-table tr td { padding: 4px 8px 4px 0; vertical-align: top; }
    .cancel-table tr td:first-child { font-weight: 600; color: var(--color-text-main); white-space: nowrap; }

    /* 評價 */
    .review-summary { display: flex; align-items: center; gap: var(--space-xl); margin-bottom: var(--space-lg); }
    .review-big-score { font-size: 56px; font-weight: 700; color: var(--color-primary); line-height: 1; }
    .review-bar-wrap { flex: 1; }
    .review-bar-row { display: flex; align-items: center; gap: var(--space-sm); font-size: 12px; margin-bottom: 4px; }
    .review-bar-label { width: 20px; text-align: right; }
    .review-bar-track { flex: 1; height: 6px; background: #e8e4d8; border-radius: 3px; overflow: hidden; }
    .review-bar-fill  { height: 100%; background: var(--color-accent-yellow); border-radius: 3px; }
    .review-card { border: 1px solid var(--color-border-light); border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-sm); }
    .review-header { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: 8px; }
    .reviewer-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
    .reviewer-name { font-size: 14px; font-weight: 600; }
    .reviewer-date { font-size: 12px; color: var(--color-text-light); }
    .review-stars { color: var(--color-accent-yellow); font-size: 13px; }
    .review-text { font-size: 13px; color: var(--color-text-sub); line-height: 1.7; }

    /* ── 右側訂房卡 ── */
    .booking-card {
      background: #fff; border: 1.5px solid var(--color-border-light);
      border-radius: var(--radius-xl); padding: var(--space-lg);
      box-shadow: var(--shadow-card);
      position: sticky; top: calc(60px + 16px);
    }
    .booking-price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: var(--space-md); }
    .booking-price { font-size: 28px; font-weight: 700; color: var(--color-primary); }
    .booking-price-unit { font-size: 13px; color: var(--color-text-sub); }
    .booking-price-orig { font-size: 14px; color: var(--color-text-light); text-decoration: line-through; }
    .booking-discount-tag {
      background: var(--color-danger); color: var(--color-danger-text);
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: var(--radius-sm);
    }

    /* 日期/人數 inputs */
    .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-xs); margin-bottom: var(--space-sm); }
    .date-field { border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: 8px 10px; }
    .date-field label { display: block; font-size: 10px; font-weight: 600; color: var(--color-text-sub); letter-spacing: 1px; margin-bottom: 2px; }
    .date-field input, .date-field select { width: 100%; border: none; padding: 0; font-size: 13px; font-family: var(--font-main); color: var(--color-text-main); background: transparent; outline: none; }

    /* 費用明細 */
    .fee-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-sub); padding: 5px 0; border-bottom: 1px solid #f0ede5; }
    .fee-row:last-child { border-bottom: none; }
    .fee-row.total { font-size: 16px; font-weight: 700; color: var(--color-text-main); padding-top: 10px; margin-top: 4px; }
    .fee-discount { color: var(--color-accent-red); }
    .fee-wrap { background: var(--color-secondary); border-radius: var(--radius-md); padding: var(--space-md); margin: var(--space-md) 0; }

    .nights-badge { background: var(--color-primary); color: #fff; font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: var(--radius-xl); text-align: center; margin-bottom: var(--space-md); }
    .no-dates { font-size: 13px; color: var(--color-text-light); text-align: center; padding: var(--space-md) 0; }

    /* ── 聊天室 ── */
    .chat-fab {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      background: var(--color-primary); color: #fff;
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; cursor: pointer; box-shadow: var(--shadow-hover);
      transition: transform .15s; border: none;
    }
    .chat-fab:hover { transform: scale(1.08); }
    .chat-fab .chat-unread {
      position: absolute; top: 0; right: 0;
      background: var(--color-accent-red); color: #fff;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .chat-window {
      position: fixed; bottom: 100px; right: 32px; z-index: 210;
      width: 340px; height: 460px; background: #fff;
      border-radius: var(--radius-xl); box-shadow: 0 8px 32px rgba(44,74,62,.2);
      display: flex; flex-direction: column;
      border: 1px solid var(--color-border-light);
      opacity: 0; pointer-events: none;
      transform: translateY(16px) scale(.96);
      transition: opacity .22s, transform .22s;
    }
    .chat-window.open { opacity: 1; pointer-events: all; transform: none; }
    .chat-win-head {
      padding: 12px var(--space-md); background: var(--color-primary);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      display: flex; align-items: center; gap: var(--space-sm);
    }
    .chat-host-avatar { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,.3); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .chat-host-name { font-size: 14px; font-weight: 600; color: #fff; }
    .chat-host-status { font-size: 11px; color: rgba(255,255,255,.7); }
    .chat-win-close { margin-left: auto; background: none; border: none; color: rgba(255,255,255,.8); font-size: 18px; cursor: pointer; }
    .chat-messages { flex: 1; overflow-y: auto; padding: var(--space-sm) var(--space-md); }
    .chat-msg { display: flex; gap: 6px; margin-bottom: var(--space-sm); }
    .chat-msg.mine { flex-direction: row-reverse; }
    .chat-msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
    .chat-bubble {
      max-width: 200px; padding: 8px 12px; border-radius: 16px;
      font-size: 13px; line-height: 1.5;
    }
    .chat-msg:not(.mine) .chat-bubble { background: #f5f3ec; color: var(--color-text-main); border-bottom-left-radius: 4px; }
    .chat-msg.mine .chat-bubble { background: var(--color-primary); color: #fff; border-bottom-right-radius: 4px; }
    .chat-canned { padding: 6px var(--space-md); border-top: 1px solid #f0ede5; display: flex; gap: 4px; flex-wrap: wrap; }
    .canned-btn {
      padding: 4px 10px; border: 1.5px solid var(--color-border);
      border-radius: var(--radius-xl); font-size: 11px; cursor: pointer;
      background: #fff; font-family: var(--font-main); color: var(--color-text-sub);
      transition: all .15s; white-space: nowrap;
    }
    .canned-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .chat-input-row {
      padding: var(--space-sm) var(--space-md);
      border-top: 1px solid var(--color-border-light);
      display: flex; gap: var(--space-sm);
    }
    .chat-input {
      flex: 1; border: 1.5px solid var(--color-border); border-radius: var(--radius-xl);
      padding: 7px 12px; font-size: 13px; font-family: var(--font-main);
      outline: none; transition: border-color .15s;
    }
    .chat-input:focus { border-color: var(--color-primary); }
    .chat-send { background: var(--color-primary); color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #2C4A3E; color: #fff; padding: 10px 24px; border-radius: var(--radius-xl); font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 9999; }
    .toast.show { opacity: 1; }  </style>
</head>
<body>
<div id="navbar-container"></div>

<div id="app">
  <div class="page-container">
    <!-- 麵包屑 -->
    <div class="page-top">
      <div class="breadcrumb">
        <div class="breadcrumb-item"><a href="index.html">首頁</a></div>
        <span class="breadcrumb-sep">›</span>
        <div class="breadcrumb-item"><a href="property-search.html">房源搜尋</a></div>
        <span class="breadcrumb-sep">›</span>
        <div class="breadcrumb-item current" id="bc-name">載入中…</div>
      </div>
    </div>

    <!-- 標題列 -->
    <div class="prop-title-row">
      <div>
        <h1 class="prop-main-title" id="prop-title">載入中…</h1>
        <div class="prop-rating-row">
          <span class="rating-stars" id="prop-stars"></span>
          <span class="rating-count" id="prop-rating-count"></span>
          <span class="prop-station-tag" id="prop-station-tag"></span>
          <span style="font-size:13px;color:var(--color-text-sub);" id="prop-distance-tag"></span>
        </div>
      </div>
      <div style="display:flex;gap:var(--space-sm);flex-shrink:0;">
        <button class="btn btn-ghost btn-sm" onclick="toggleFavDetail()" id="fav-btn">🤍 收藏</button>
        <button class="btn btn-ghost btn-sm" onclick="copyLink()">🔗 分享</button>
      </div>
    </div>

    <!-- 照片格 -->
    <div class="photo-grid" id="photo-grid"><!-- 動態填入 --></div>

    <!-- 主內容 -->
    <div class="detail-grid">

      <!-- 左側 -->
      <div>
        <!-- 房源介紹 -->
        <div class="section">
          <div class="section-head">房源介紹</div>
          <div class="desc-text" id="prop-desc"></div>
          <div style="display:flex;gap:var(--space-md);margin-top:var(--space-md);flex-wrap:wrap;" id="prop-basic-meta">
          </div>
        </div>

        <!-- 設備列表 -->
        <div class="section">
          <div class="section-head">設備與服務</div>
          <div class="facility-grid" id="facility-grid"><!-- 動態填入 --></div>
        </div>

        <!-- 房源政策 -->
        <div class="section">
          <div class="section-head">房源政策</div>
          <div class="policy-grid" id="policy-grid"><!-- 動態填入 --></div>
          <div style="margin-top:var(--space-md);">
            <div style="font-size:14px;font-weight:600;margin-bottom:var(--space-sm);">取消規則</div>
            <table class="cancel-table">
              <tr><td>入住前 10 天以上</td><td>全額退款</td></tr>
              <tr><td>入住前 4–9 天</td><td>退款 70%（扣 30% 手續費）</td></tr>
              <tr><td>入住前 3 天內</td><td>不退款</td></tr>
            </table>
          </div>
        </div>

        <!-- 評價列表 -->
        <div class="section">
          <div class="section-head">住客評價</div>
          <div class="review-summary" id="review-summary"><!-- 動態填入 --></div>
          <div id="review-list"><!-- 動態填入 --></div>
        </div>
      </div>

      <!-- 右側訂房卡 -->
      <div>
        <div class="booking-card" id="booking-card">
          <div class="booking-price-row">
            <span class="booking-price" id="bc-price">—</span>
            <span class="booking-price-unit">/ 晚（平日）</span>
          </div>
          <div style="font-size:12px;color:var(--color-text-sub);margin-bottom:var(--space-md);" id="bc-weekend-price"></div>

          <!-- 日期 + 人數 -->
          <div class="date-grid">
            <div class="date-field">
              <label>入住日期</label>
              <input type="date" id="bc-checkin" onchange="calcFee()">
            </div>
            <div class="date-field">
              <label>退房日期</label>
              <input type="date" id="bc-checkout" onchange="calcFee()">
            </div>
          </div>
          <div class="date-field" style="margin-bottom:var(--space-md);">
            <label>入住人數</label>
            <select id="bc-guests" onchange="calcFee()">
              <option value="1">1 人</option>
              <option value="2" selected>2 人</option>
              <option value="3">3 人</option>
              <option value="4">4 人</option>
            </select>
          </div>

          <!-- 費用明細 -->
          <div id="bc-fee-area">
            <div class="no-dates">請選擇入住與退房日期</div>
          </div>

          <!-- 行動按鈕 -->
          <div style="display:flex;flex-direction:column;gap:var(--space-sm);margin-top:var(--space-md);" id="bc-actions">
            <button class="btn btn-primary btn-full" onclick="bookNow()">立即訂房</button>
            <button class="btn btn-outline btn-full" onclick="addToCartDetail()">加入購物車</button>
            <button class="btn btn-ghost btn-full" onclick="openChat()">💬 聯繫房東</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 聊天室 FAB -->
<button class="chat-fab" onclick="toggleChat()" id="chat-fab" aria-label="聯繫房東">
  💬
  <span class="chat-unread" id="chat-unread" style="display:none;">1</span>
</button>

<!-- 聊天視窗 -->
<div class="chat-window" id="chat-window" role="dialog" aria-label="聊天室" aria-modal="true">
  <div class="chat-win-head">
    <div class="chat-host-avatar">🏠</div>
    <div>
      <div class="chat-host-name" id="chat-host-name">房東</div>
      <div class="chat-host-status" id="chat-status">通常 30 分鐘內回覆</div>
    </div>
    <button class="chat-win-close" onclick="closeChat()" aria-label="關閉">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"><!-- 動態填入 --></div>
  <div class="chat-canned">
    <button class="canned-btn" onclick="sendCanned('如何前往房間？')">🗺 房間導航</button>
    <button class="canned-btn" onclick="sendCanned('可以寄放行李嗎？')">🧳 行李寄放</button>
    <button class="canned-btn" onclick="sendCanned('有停車場嗎？')">🚗 停車資訊</button>
    <button class="canned-btn" onclick="sendCanned('幾點供應早餐？')">🍳 早餐時間</button>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" type="text" id="chat-input" placeholder="輸入訊息…" onkeydown="onChatKey(event)">
    <button class="chat-send" onclick="sendMsg()" aria-label="送出">➤</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div id="footer-container"></div>

<script src="shared-data.js"></script>
<script src="shared-chat.js"></script>
<script src="shared-nav.js"></script>
<script>
  renderNav();
  renderFooter();

  /* ── 頁面保護 ── */
  const currentUser = getCurrentUser();
  if (!currentUser) { window.location.href = 'login.html'; }

  /* ── 工具 ── */
  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showToast(msg, ms = 2200) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ms);
  }

  /* ── 房源展示擴充資料 ── */
  const PROP_DISPLAY = {
    prop_01: {
      distance: 0.3,
      photos: [
        { emoji: '🏡', bg: '#C8E6C9' }, { emoji: '🛏️', bg: '#F0E8D0' },
        { emoji: '🚿', bg: '#D8EEF4' }, { emoji: '🌿', bg: '#DCEDC8' },
        { emoji: '🚲', bg: '#FFF9C4' },
      ],
    },
    prop_02: {
      distance: 0.5,
      photos: [
        { emoji: '🌲', bg: '#D7CCC8' }, { emoji: '🛏️', bg: '#EFEBE9' },
        { emoji: '🛁', bg: '#F5F0E8' }, { emoji: '🪵', bg: '#BCAAA4' },
        { emoji: '☕', bg: '#FFF3E0' },
      ],
    },
    prop_03: {
      distance: 0.2,
      photos: [
        { emoji: '🚂', bg: '#FFCDD2' }, { emoji: '🛏️', bg: '#FCE4EC' },
        { emoji: '🚿', bg: '#F3E5F5' }, { emoji: '🏭', bg: '#E8EAF6' },
        { emoji: '☕', bg: '#FFF8E1' },
      ],
    },
  };
  function pdisplay(id) {
    return PROP_DISPLAY[id] || {
      distance: 1.0,
      photos: Array(5).fill(null).map((_, i) => ({ emoji: '🏠', bg: '#f0ede5' })),
    };
  }

  /* ── 購物車 ── */
  const CART_KEY = 'agenttt_cart';
  function getCart() { try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch { return []; } }
  function setCart(c) { localStorage.setItem(CART_KEY, JSON.stringify(c)); }

  /* ── 狀態 ── */
  const params  = new URLSearchParams(window.location.search);
  const propId  = params.get('id');
  let   propData = null;
  let   chatOpen = false;
  let   chatMsgs = [];  // { sender:'host'|'me', text, time }

  /* ── 初始化 ── */
  function init() {
    if (!propId) { window.location.href = 'property-search.html'; return; }
    propData = getPropertyById(propId);
    if (!propData) { window.location.href = 'property-search.html'; return; }

    document.title = `Agent TT — ${propData.name}`;

    renderHeader();
    renderPhotos();
    renderDesc();
    renderFacilities();
    renderPolicy();
    renderReviews();
    prefillDates();
    renderFavBtn();
    initChat();
  }

  /* ── 標題 ── */
  function renderHeader() {
    document.getElementById('bc-name').textContent      = propData.name;
    document.getElementById('prop-title').textContent   = propData.name;

    const rating = propData.rating || 0;
    const filled = Math.round(rating);
    document.getElementById('prop-stars').textContent   = '★'.repeat(filled) + '☆'.repeat(5 - filled) + ' ' + rating;
    document.getElementById('prop-rating-count').textContent = `（${propData.reviewCount || 0} 則評價）`;
    document.getElementById('prop-station-tag').textContent  = propData.station;
    document.getElementById('prop-distance-tag').textContent = `・距車站 ${pdisplay(propId).distance} 公里`;

    document.getElementById('bc-price').textContent = `NT$ ${(propData.priceWeekday || 0).toLocaleString()}`;
    document.getElementById('bc-weekend-price').textContent =
      `假日 NT$ ${(propData.priceWeekend || 0).toLocaleString()} / 晚　國定假日 NT$ ${(propData.priceHoliday || 0).toLocaleString()} / 晚`;
  }

  /* ── 照片格 ── */
  function renderPhotos() {
    const grid = document.getElementById('photo-grid');
    const real = Array.isArray(propData.photos) ? propData.photos : [];

    if (real.length) {
      // 房東實際上傳的照片：補滿 5 格（不足的格子用第一張填，維持版面）
      const cells = [];
      for (let i = 0; i < 5; i++) {
        const src = real[i] || real[0];
        cells.push(
          `<div class="photo-cell" style="padding:0;overflow:hidden;background:#f0ede5;">
             <img src="${src}" alt="房源照片 ${i+1}" style="width:100%;height:100%;object-fit:cover;">
             ${i === 4 ? `<div class="photo-more">📷 共 ${real.length} 張照片</div>` : ''}
           </div>`);
      }
      grid.innerHTML = cells.join('');
      return;
    }

    // 無上傳照片：沿用 emoji 佔位
    const photos = pdisplay(propId).photos;
    grid.innerHTML = photos.map((p, i) =>
      `<div class="photo-cell" style="background:${p.bg};">
         ${p.emoji}
         ${i === 4 ? `<div class="photo-more">📷 查看全部照片</div>` : ''}
       </div>`
    ).join('');
  }

  /* ── 房源介紹 ── */
  function renderDesc() {
    document.getElementById('prop-desc').textContent = propData.description || '';
    document.getElementById('prop-basic-meta').innerHTML = `
      <span style="display:flex;align-items:center;gap:4px;font-size:13px;padding:6px 12px;background:var(--color-secondary);border-radius:var(--radius-md);">🏠 ${escHtml(propData.roomType || '')}</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:13px;padding:6px 12px;background:var(--color-secondary);border-radius:var(--radius-md);">👥 最多 ${propData.maxGuests || 1} 人</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:13px;padding:6px 12px;background:var(--color-secondary);border-radius:var(--radius-md);">📍 ${escHtml(propData.station || '')}</span>
    `;
  }

  /* ── 設備（✓/✗） ── */
  function renderFacilities() {
    const ALL_FACS = [
      { key:'Wi-Fi',     icon:'📶' },
      { key:'冷氣',      icon:'❄️' },
      { key:'停車場',    icon:'🅿️' },
      { key:'早餐',      icon:'🍳' },
      { key:'自行車租借',icon:'🚲' },
      { key:'木作體驗',  icon:'🪵' },
      { key:'共用廚房',  icon:'🍳' },
      { key:'行李寄放',  icon:'🧳' },
      { key:'電視',      icon:'📺' },
      { key:'洗衣機',    icon:'👕' },
      { key:'熱水壺',    icon:'☕' },
      { key:'寵物友善',  icon:'🐾' },
    ];
    const has = new Set(propData.facilities || []);
    document.getElementById('facility-grid').innerHTML = ALL_FACS.map(f => `
      <div class="facility-item ${has.has(f.key) ? '' : 'no'}">
        <span class="f-icon">${has.has(f.key) ? '✅' : '❌'}</span>
        <span>${f.icon} ${escHtml(f.key)}</span>
      </div>`).join('');
  }

  /* ── 房源政策 ── */
  function renderPolicy() {
    document.getElementById('policy-grid').innerHTML = `
      <div class="policy-item">
        <div class="policy-label">CHECK-IN</div>
        <div class="policy-val">⬆️ ${escHtml(propData.checkInTime || '15:00')} 之後</div>
      </div>
      <div class="policy-item">
        <div class="policy-label">CHECK-OUT</div>
        <div class="policy-val">⬇️ ${escHtml(propData.checkOutTime || '11:00')} 之前</div>
      </div>
      <div class="policy-item">
        <div class="policy-label">最多入住人數</div>
        <div class="policy-val">👥 ${propData.maxGuests || 1} 人</div>
      </div>
      <div class="policy-item">
        <div class="policy-label">房型</div>
        <div class="policy-val">🏠 ${escHtml(propData.roomType || '')}</div>
      </div>
    `;
  }

  /* ── 評價列表 ── */
  function renderReviews() {
    // 排除管理員已隱藏的評價（前台不顯示）
    const reviews = getReviews(propId).filter(r => !r.hidden);

    if (!reviews.length) {
      // 無文字評價時，header 仍沿用房源既有評分，與搜尋頁顯示一致（避免「評價沒有同步」）
      const seededCount  = propData.reviewCount || 0;
      const seededRating = propData.rating || 0;
      const filledSeed   = Math.round(seededRating);
      if (seededCount > 0) {
        document.getElementById('prop-stars').textContent       = '★'.repeat(filledSeed) + '☆'.repeat(5 - filledSeed) + ' ' + seededRating.toFixed(1);
        document.getElementById('prop-rating-count').textContent = `（${seededCount} 則評價）`;
        document.getElementById('review-summary').innerHTML =
          `<div style="text-align:center;"><div class="review-big-score">${seededRating.toFixed(1)}</div><div style="color:var(--color-accent-yellow);font-size:18px;">${'★'.repeat(filledSeed)}${'☆'.repeat(5-filledSeed)}</div><div style="font-size:12px;color:var(--color-text-sub);margin-top:4px;">${seededCount} 則評價</div></div>`;
      } else {
        document.getElementById('prop-stars').textContent       = '☆☆☆☆☆';
        document.getElementById('prop-rating-count').textContent = '（尚無評價）';
        document.getElementById('review-summary').innerHTML =
          `<div style="color:var(--color-text-sub);font-size:14px;padding:var(--space-sm) 0;">尚無評價，成為第一個評價此房源的旅客！</div>`;
      }
      document.getElementById('review-list').innerHTML =
        `<div style="color:var(--color-text-light);font-size:13px;padding:var(--space-md) 0;">目前尚無文字評價</div>`;
      return;
    }

    /* 動態計算平均分與星等分佈 */
    const avg      = reviews.reduce((s, r) => s + r.rating, 0) / reviews.length;
    const avgFixed = avg.toFixed(1);
    const distrib  = {};
    [1,2,3,4,5].forEach(n => {
      distrib[n] = Math.round(reviews.filter(r => r.rating === n).length / reviews.length * 100);
    });

    /* 更新 header 評分 */
    const filled = Math.round(avg);
    document.getElementById('prop-stars').textContent        = '★'.repeat(filled) + '☆'.repeat(5 - filled) + ' ' + avgFixed;
    document.getElementById('prop-rating-count').textContent = `（${reviews.length} 則評價）`;

    /* 評分摘要區塊 */
    const barsHtml = [5,4,3,2,1].map(n => `
      <div class="review-bar-row">
        <span class="review-bar-label">${n}★</span>
        <div class="review-bar-track">
          <div class="review-bar-fill" style="width:${distrib[n]}%;"></div>
        </div>
        <span style="width:28px;font-size:11px;color:var(--color-text-light);">${distrib[n]}%</span>
      </div>`).join('');

    document.getElementById('review-summary').innerHTML = `
      <div style="text-align:center;">
        <div class="review-big-score">${avgFixed}</div>
        <div style="color:var(--color-accent-yellow);font-size:18px;">${'★'.repeat(filled)}${'☆'.repeat(5-filled)}</div>
        <div style="font-size:12px;color:var(--color-text-sub);margin-top:4px;">${reviews.length} 則評價</div>
      </div>
      <div class="review-bar-wrap">${barsHtml}</div>
    `;

    /* 評價列表（最新優先） */
    document.getElementById('review-list').innerHTML = reviews
      .slice().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
      .map(r => {
        const name    = r.userName || r.name || '旅客';
        const initial = name.slice(0, 1);
        const date    = r.createdAt ? r.createdAt.slice(0, 10) : (r.date || '');
        const stars   = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
        const photos  = Array.isArray(r.photos) ? r.photos : [];
        const photoHtml = photos.length
          ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">${
              photos.map((src, i) => `<img src="${src}" alt="評價照片 ${i+1}" style="width:84px;height:84px;object-fit:cover;border-radius:8px;cursor:pointer;" onclick="window.open('${src}','_blank')">`).join('')
            }</div>`
          : '';
        return `
          <div class="review-card">
            <div class="review-header">
              <div class="reviewer-avatar">${escHtml(initial)}</div>
              <div>
                <div class="reviewer-name">${escHtml(name)}</div>
                <div class="reviewer-date">${escHtml(date)}</div>
              </div>
              <div class="review-stars" style="margin-left:auto;">${stars}</div>
            </div>
            <div class="review-text">${escHtml(r.text)}</div>
            ${photoHtml}
          </div>`;
      }).join('');
  }

  /* ── 預填日期 ── */
  function prefillDates() {
    const checkinEl  = document.getElementById('bc-checkin');
    const checkoutEl = document.getElementById('bc-checkout');

    // 從搜尋頁帶入
    if (params.get('checkin'))  checkinEl.value  = params.get('checkin');
    if (params.get('checkout')) checkoutEl.value = params.get('checkout');
    if (params.get('guests'))   document.getElementById('bc-guests').value = params.get('guests');

    // 預設：7天後入住，9天後退房
    if (!checkinEl.value) {
      const ci = new Date(); ci.setDate(ci.getDate() + 7);
      const co = new Date(); co.setDate(co.getDate() + 9);
      checkinEl.value  = ci.toISOString().slice(0,10);
      checkoutEl.value = co.toISOString().slice(0,10);
    }
    calcFee();
  }

  /* ── 費用試算 ── */
  function calcFee() {
    const checkin  = document.getElementById('bc-checkin').value;
    const checkout = document.getElementById('bc-checkout').value;
    const area     = document.getElementById('bc-fee-area');

    if (!checkin || !checkout || checkin >= checkout) {
      area.innerHTML = `<div class="no-dates">請選擇有效的入住與退房日期</div>`;
      return;
    }

    const nights = Math.round((new Date(checkout) - new Date(checkin)) / 86400000);
    // 房費依每一晚平日/週末/假日分別計價
    const roomTotal     = calcRoomTotal(propData, checkin, checkout);
    const hasDiscount   = nights >= 2;
    const discounted    = hasDiscount ? Math.round(roomTotal * 0.8) : roomTotal;
    const cleaningFee   = 200;
    const serviceFee    = Math.round(discounted * 0.05);
    const grandTotal    = discounted + cleaningFee + serviceFee;

    const discountRow = hasDiscount
      ? `<div class="fee-row fee-discount"><span>🎉 訂滿2晚8折優惠</span><span>- NT$ ${(roomTotal - discounted).toLocaleString()}</span></div>`
      : '';

    area.innerHTML = `
      <div class="nights-badge">${nights} 晚</div>
      <div class="fee-wrap">
        <div class="fee-row"><span>房費（${nights} 晚 · 含平假日）</span><span>NT$ ${roomTotal.toLocaleString()}</span></div>
        ${discountRow}
        <div class="fee-row"><span>清潔費</span><span>NT$ ${cleaningFee.toLocaleString()}</span></div>
        <div class="fee-row"><span>服務費（5%）</span><span>NT$ ${serviceFee.toLocaleString()}</span></div>
        <div class="fee-row total"><span>合計</span><span>NT$ ${grandTotal.toLocaleString()}</span></div>
      </div>`;
  }

  /* ── 立即訂房 ── */
  function bookNow() {
    const checkin  = document.getElementById('bc-checkin').value;
    const checkout = document.getElementById('bc-checkout').value;
    const guests   = document.getElementById('bc-guests').value;
    if (!checkin || !checkout || checkin >= checkout) {
      showToast('⚠️ 請先選擇有效的入住與退房日期'); return;
    }
    const avail = checkAvailability(propId, checkin, checkout);
    if (!avail.ok) { showToast('⚠️ ' + avail.reason); return; }
    // 先加入購物車再跳轉
    addToCartInternal(checkin, checkout, Number(guests));
    window.location.href = `property-cart.html?direct=1&propId=${encodeURIComponent(propId)}&checkIn=${checkin}&checkOut=${checkout}&guests=${guests}`;
  }

  /* ── 加入購物車（detail 頁） ── */
  function addToCartDetail() {
    const checkin  = document.getElementById('bc-checkin').value;
    const checkout = document.getElementById('bc-checkout').value;
    const guests   = Number(document.getElementById('bc-guests').value);
    if (!checkin || !checkout || checkin >= checkout) {
      showToast('⚠️ 請先選擇有效的入住與退房日期'); return;
    }
    const avail = checkAvailability(propId, checkin, checkout);
    if (!avail.ok) { showToast('⚠️ ' + avail.reason); return; }
    addToCartInternal(checkin, checkout, guests);
    showToast(`🛒 已加入購物車：${propData.name}`);
  }

  function addToCartInternal(checkin, checkout, guests) {
    const cart = getCart();
    if (cart.some(c => c.propertyId === propId && c.checkIn === checkin)) return;
    const nights       = Math.round((new Date(checkout) - new Date(checkin)) / 86400000);
    const originalTotal = calcRoomTotal(propData, checkin, checkout);   // 平日/週末/假日分別計價
    const pricePerNight = nights > 0 ? Math.round(originalTotal / nights) : propData.priceWeekday;  // 平均每晚（顯示用）
    const discounted    = nights >= 2 ? Math.round(originalTotal * 0.8) : originalTotal;
    cart.push({
      id:              'cart_' + generateId(),
      propertyId:      propId,
      propertyName:    propData.name,
      station:         propData.station,
      checkIn:         checkin,
      checkOut:        checkout,
      guests,
      nights,
      pricePerNight,
      originalTotal,
      discountedPrice: discounted,
    });
    setCart(cart);
  }

  /* ── 收藏 ── */
  function renderFavBtn() {
    const isFav = getFavorites().includes(propId);
    document.getElementById('fav-btn').textContent = isFav ? '❤️ 已收藏' : '🤍 收藏';
  }
  function toggleFavDetail() {
    const added = toggleFavorite(propId);
    document.getElementById('fav-btn').textContent = added ? '❤️ 已收藏' : '🤍 收藏';
    showToast(added ? '❤️ 已加入收藏' : '🤍 已移除收藏');
  }

  /* ── 分享 ── */
  function copyLink() {
    const url = window.location.href;
    navigator.clipboard?.writeText(url).then(() => showToast('✓ 連結已複製'))
      .catch(() => showToast('請手動複製網址列'));
  }

  /* ── 聊天室 ── */
  const CANNED_ANSWERS = {
    '如何前往房間？':   '您好！辦理入住後工作人員會親自帶您到房間，停車場在大門左側，步行約30秒即可抵達。如需協助請隨時告知🙏',
    '可以寄放行李嗎？': '當然可以！我們提供免費行李寄放服務，入住前或退房後均可寄放，請於前台登記即可🧳',
    '有停車場嗎？':     '有的！我們有免費自用停車場，共10個車位，先到先得。如停車位已滿，附近200公尺處有公共停車場🚗',
    '幾點供應早餐？':   '早餐時間為 07:30–09:30，在一樓餐廳供應。菜單包含台式飲品和在地農產食材，歡迎享用🍳',
  };

  function initChat() {
    // 預設兩則：說明 + 歡迎
    chatMsgs = [
      { sender:'host', text:'💡 此為房源預諮詢（AI 模擬）。完成訂房後，可在「我的訂單」中與房東進行正式對話。', time: nowISO() },
      { sender:'host', text:`您好！歡迎詢問「${propData.name}」，請問有什麼需要協助的嗎？😊`, time: nowISO() }
    ];
    renderChatMessages();
    // 顯示未讀提示
    document.getElementById('chat-unread').style.display = 'flex';
  }

  function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chat-window').classList.toggle('open', chatOpen);
    if (chatOpen) {
      document.getElementById('chat-unread').style.display = 'none';
      scrollChatBottom();
      document.getElementById('chat-input').focus();
    }
  }
  function openChat()  { if (!chatOpen) toggleChat(); }
  function closeChat() { if (chatOpen)  toggleChat(); }

  function renderChatMessages() {
    const user = currentUser || { name: '我' };
    document.getElementById('chat-messages').innerHTML = chatMsgs.map(m => {
      const isMine = m.sender === 'me';
      const initial = isMine ? (user.name || '我').slice(0,1) : '🏠';
      return `
        <div class="chat-msg ${isMine ? 'mine' : ''}">
          <div class="chat-msg-avatar">${initial}</div>
          <div class="chat-bubble">${escHtml(m.text)}</div>
        </div>`;
    }).join('');
    scrollChatBottom();
  }

  function scrollChatBottom() {
    const box = document.getElementById('chat-messages');
    setTimeout(() => { box.scrollTop = box.scrollHeight; }, 50);
  }

  function sendMsg() {
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    chatMsgs.push({ sender:'me', text, time: nowISO() });
    renderChatMessages();
    // 自動回覆（延遲 1s）
    setTimeout(() => {
      chatMsgs.push({ sender:'host', text:'感謝您的訊息！我們會盡快回覆您，通常在 30 分鐘內。如有急事請來電 📞', time: nowISO() });
      renderChatMessages();
    }, 1000);
  }

  function sendCanned(text) {
    chatMsgs.push({ sender:'me', text, time: nowISO() });
    renderChatMessages();
    if (!chatOpen) { document.getElementById('chat-window').classList.add('open'); chatOpen = true; }
    document.getElementById('chat-unread').style.display = 'none';
    setTimeout(() => {
      const reply = CANNED_ANSWERS[text] || '感謝您的詢問，我們稍後回覆您！';
      chatMsgs.push({ sender:'host', text: reply, time: nowISO() });
      renderChatMessages();
    }, 800);
  }

  function onChatKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  }

  /* ── 更新聊天室 head（房東名）── */
  function updateChatHead() {
    document.getElementById('chat-host-name').textContent = propData.name + '・房東';
  }

  init();
  updateChatHead();
</script>
