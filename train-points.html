<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent TT — 點數中心</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    body { background: var(--color-bg); }

    .page-header { padding: var(--space-xl) 0 var(--space-md); border-bottom: 1px solid var(--color-border-light); margin-bottom: var(--space-xl); }
    .page-header h1 { font-size: 24px; font-weight: 700; color: var(--color-text-main); }

    .content-wrap { max-width: 860px; padding-bottom: 60px; }

    /* ── 點數餘額卡片 ── */
    .balance-card {
      background: linear-gradient(135deg, #2C4A3E 0%, #1A3A2E 100%);
      border-radius: var(--radius-lg);
      padding: 32px 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
      margin-bottom: 20px;
      color: #FAF6EC;
    }
    .balance-label { font-size: 12px; letter-spacing: 2px; opacity: .65; margin-bottom: 8px; }
    .balance-amount { font-size: 52px; font-weight: 700; letter-spacing: -1px; color: #E8C547; line-height: 1; }
    .balance-unit { font-size: 20px; color: #FAF6EC; opacity: .8; margin-left: 8px; }
    .balance-sub { font-size: 12px; opacity: .6; margin-top: 8px; }
    .balance-train-svg { opacity: .2; }

    /* ── 訂票進度條 ── */
    .progress-card {
      background: #fff;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .progress-card-title { font-size: 14px; font-weight: 700; color: var(--color-text-main); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .progress-card-sub   { font-size: 12px; color: var(--color-text-light); margin-bottom: 16px; }
    .progress-bar-wrap { position: relative; height: 12px; background: #EEE; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
    .progress-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--color-primary), #5A9B76); transition: width .6s; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-light); }
    .milestone-dots { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .milestone-dot {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 10px; color: var(--color-text-light);
    }
    .milestone-dot .dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--color-border);
      background: #fff;
    }
    .milestone-dot.reached .dot { background: var(--color-primary); border-color: var(--color-primary); }
    .milestone-dot.reached { color: var(--color-primary); font-weight: 600; }

    /* ── 優惠券區塊 ── */
    .coupon-section { margin-bottom: 20px; }
    .coupon-section-title { font-size: 14px; font-weight: 700; color: var(--color-text-main); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .coupon-card {
      background: #fff;
      border: 1.5px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 10px;
    }
    .coupon-stamp {
      background: var(--color-accent-red);
      border-radius: var(--radius-md);
      padding: 10px;
      text-align: center;
      color: #fff;
    }
    .coupon-stamp-pct { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
    .coupon-stamp-unit { font-size: 10px; letter-spacing: 1px; opacity: .8; }
    .coupon-info-name { font-size: 15px; font-weight: 700; color: var(--color-text-main); margin-bottom: 4px; }
    .coupon-info-meta { font-size: 12px; color: var(--color-text-sub); line-height: 1.7; }
    .coupon-status { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
    .coupon-valid  { background: var(--color-success); color: var(--color-success-text); }
    .coupon-used   { background: #EEE; color: #9E9E9E; }
    .coupon-expired { background: var(--color-danger); color: var(--color-danger-text); }

    .no-coupon {
      background: #fff;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      color: var(--color-text-light);
      font-size: 13px;
    }

    /* ── 制度說明 ── */
    .policy-card { background: #fff; border: 1px solid var(--color-border-light); border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 20px; }
    .policy-card-title { font-size: 14px; font-weight: 700; color: var(--color-text-main); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .policy-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .policy-item { background: var(--color-bg); border-radius: var(--radius-md); padding: 14px; text-align: center; }
    .policy-item-icon { font-size: 24px; margin-bottom: 6px; }
    .policy-item-title { font-size: 12px; font-weight: 700; color: var(--color-text-main); margin-bottom: 4px; }
    .policy-item-desc  { font-size: 11px; color: var(--color-text-sub); line-height: 1.7; }

    /* ── 異動記錄 ── */
    .history-section { }
    .history-title { font-size: 14px; font-weight: 700; color: var(--color-text-main); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .history-filter-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .history-tab {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--color-border-light);
      background: #fff; color: var(--color-text-sub); font-family: var(--font-main);
      transition: all .15s;
    }
    .history-tab.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

    .history-list { }
    .history-item {
      background: #fff;
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }
    .history-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .icon-earn  { background: #E8F4ED; }
    .icon-use   { background: #FBEAEA; }
    .icon-comp  { background: #FFF8E6; }
    .history-info { }
    .history-reason { font-size: 13px; font-weight: 600; color: var(--color-text-main); }
    .history-date   { font-size: 11px; color: var(--color-text-light); margin-top: 2px; }
    .history-amount { font-size: 15px; font-weight: 700; white-space: nowrap; }
    .amount-earn { color: var(--color-primary); }
    .amount-use  { color: var(--color-accent-red); }
    .amount-comp { color: #7A5A1A; }

    .empty-history { text-align: center; padding: 32px; color: var(--color-text-light); font-size: 13px; }  </style>
</head>
<body>
<div id="navbar-container"></div>

<main>
  <div class="page-container">
    <div class="page-header">
      <h1>⭐ 點數中心</h1>
    </div>

    <div class="content-wrap">

      <!-- ── 點數餘額卡片 ── -->
      <div class="balance-card">
        <div>
          <div class="balance-label">MY POINTS 我的點數</div>
          <div>
            <span class="balance-amount" id="balance-display">0</span>
            <span class="balance-unit">點</span>
          </div>
          <div class="balance-sub" id="balance-sub-text">—</div>
        </div>
        <svg class="balance-train-svg" width="120" height="80" viewBox="0 0 120 80">
          <rect x="10" y="20" width="80" height="40" rx="8" fill="#FAF6EC"/>
          <rect x="18" y="28" width="18" height="16" rx="2" fill="#2C4A3E"/>
          <rect x="42" y="28" width="18" height="16" rx="2" fill="#2C4A3E"/>
          <rect x="66" y="28" width="18" height="16" rx="2" fill="#2C4A3E"/>
          <circle cx="28" cy="64" r="8" fill="#2C4A3E"/>
          <circle cx="72" cy="64" r="8" fill="#2C4A3E"/>
          <rect x="0" y="60" width="110" height="4" rx="2" fill="#C5B886" opacity=".4"/>
          <rect x="88" y="28" width="22" height="32" rx="4" fill="#E8C547"/>
        </svg>
      </div>

      <!-- ── 訂票累積進度 ── -->
      <div class="progress-card">
        <div class="progress-card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          訂票累積進度
        </div>
        <div class="progress-card-sub">每滿 5 筆訂票自動獲得 30 點獎勵點數</div>
        <div class="milestone-dots" id="milestone-dots"></div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-labels">
          <span id="progress-label-left">已訂 0 張票</span>
          <span id="progress-label-right">距下次獎勵還差 5 張</span>
        </div>
      </div>

      <!-- ── 優惠券 ── -->
      <div class="coupon-section">
        <div class="coupon-section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="6" y1="12" x2="6.01" y2="12"/></svg>
          我的優惠券
        </div>
        <div id="coupon-list">
          <div class="no-coupon">載入中…</div>
        </div>
      </div>

      <!-- ── 制度說明 ── -->
      <div class="policy-card">
        <div class="policy-card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          點數制度說明
        </div>
        <div class="policy-grid">
          <div class="policy-item">
            <div class="policy-item-icon">🎫</div>
            <div class="policy-item-title">如何累積</div>
            <div class="policy-item-desc">每次訂票獲得 9 點<br>每滿 5 筆訂票額外獎勵 30 點<br>訂房滿 2 晚贈八折優惠券</div>
          </div>
          <div class="policy-item">
            <div class="policy-item-icon">💰</div>
            <div class="policy-item-title">如何使用</div>
            <div class="policy-item-desc">訂票時點數折抵<br>1 點 = NT$1<br>每筆最多折抵票價 50%</div>
          </div>
          <div class="policy-item">
            <div class="policy-item-icon">⏰</div>
            <div class="policy-item-title">有效期限</div>
            <div class="policy-item-desc">點數自獲得日起<br>有效期限 2 年<br>優惠券依到期日為準</div>
          </div>
        </div>
      </div>

      <!-- ── 異動記錄 ── -->
      <div class="history-section">
        <div class="history-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h12"/></svg>
          點數異動記錄
        </div>
        <div class="history-filter-tabs">
          <button class="history-tab active" onclick="filterHistory('all',this)">全部</button>
          <button class="history-tab" onclick="filterHistory('earn',this)">獲得</button>
          <button class="history-tab" onclick="filterHistory('use',this)">使用</button>
          <button class="history-tab" onclick="filterHistory('compensate',this)">補償</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </div>

    </div>
  </div>
</main>

<div id="footer-container"></div>
<script src="shared-data.js"></script>
<script src="shared-chat.js"></script>
<script src="shared-nav.js"></script>
<script>
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let historyFilter = 'all';

/* ── 點數餘額 ── */
function renderBalance() {
  const pts = getPoints();
  document.getElementById('balance-display').textContent = pts.toLocaleString();

  const history = getPointsHistory();
  const totalEarned = history.filter(h => h.amount > 0).reduce((a, h) => a + h.amount, 0);
  const totalUsed   = history.filter(h => h.amount < 0).reduce((a, h) => a + Math.abs(h.amount), 0);
  document.getElementById('balance-sub-text').textContent = `累積獲得 ${totalEarned} 點 ｜ 已使用 ${totalUsed} 點`;
}

/* ── 訂票進度條 ── */
function renderProgress() {
  const user = getCurrentUser();
  const tickets = user ? getTicketsByUser(user.id) : [];
  const totalTickets = tickets.length;
  const inCycle = totalTickets % 5;
  const pct  = (inCycle / 5) * 100;
  const need = 5 - inCycle;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label-left').textContent = `已訂 ${totalTickets} 張票`;
  document.getElementById('progress-label-right').textContent = need === 5
    ? `每 5 張票得 30 點，繼續加油！`
    : `距下次獎勵還差 ${need} 張`;

  // 里程碑點
  const milestones = [1, 2, 3, 4, 5];
  document.getElementById('milestone-dots').innerHTML = milestones.map(m => `
    <div class="milestone-dot ${inCycle >= m || (inCycle === 0 && totalTickets > 0) ? 'reached' : ''}">
      <div class="dot"></div>
      <div>${m}</div>
    </div>`).join('');
}

/* ── 優惠券 ── */
function renderCoupons() {
  const now = new Date();
  const coupons = getCoupons();
  const list = document.getElementById('coupon-list');

  if (!coupons.length) {
    list.innerHTML = `<div class="no-coupon">🎟️ 目前沒有優惠券<br><span style="font-size:12px;margin-top:6px;display:block;">訂房滿 2 晚即可獲得台鐵八折優惠券！</span></div>`;
    return;
  }

  const TYPE_LABELS = { train_80percent: '台鐵八折優惠券' };
  list.innerHTML = coupons.map(c => {
    const expired = new Date(c.expiresAt) < now;
    const statusCls = c.usedAt ? 'coupon-used' : (expired ? 'coupon-expired' : 'coupon-valid');
    const statusText = c.usedAt ? '已使用' : (expired ? '已過期' : '可使用');
    const name = TYPE_LABELS[c.type] || c.type;
    return `
      <div class="coupon-card" style="${c.usedAt || expired ? 'opacity:.6;' : ''}">
        <div class="coupon-stamp">
          <div class="coupon-stamp-pct">8折</div>
          <div class="coupon-stamp-unit">OFF</div>
        </div>
        <div>
          <div class="coupon-info-name">${escHtml(name)}</div>
          <div class="coupon-info-meta">
            適用於台鐵車票折扣，最高折扣 20%<br>
            到期日：${escHtml(c.expiresAt.slice(0,10))}
            ${c.usedAt ? `・使用日：${escHtml(c.usedAt.slice(0,10))}` : ''}
          </div>
        </div>
        <span class="coupon-status ${statusCls}">${escHtml(statusText)}</span>
      </div>`;
  }).join('');
}

/* ── 異動記錄 ── */
function filterHistory(filter, el) {
  historyFilter = filter;
  document.querySelectorAll('.history-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function renderHistory() {
  const user = getCurrentUser();
  const list = document.getElementById('history-list');
  if (!user) { list.innerHTML = ''; return; }

  let records = getPointsHistory().filter(h => h.userId === user.id || !h.userId);
  if (historyFilter !== 'all') {
    records = records.filter(h => h.type === historyFilter);
  }
  records.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  if (!records.length) {
    list.innerHTML = '<div class="empty-history">目前沒有點數異動記錄</div>';
    return;
  }

  const iconMap = { earn: { cls: 'icon-earn', emoji: '⭐' }, use: { cls: 'icon-use', emoji: '💸' }, compensate: { cls: 'icon-comp', emoji: '🎁' } };
  const amtMap  = { earn: 'amount-earn', use: 'amount-use', compensate: 'amount-comp' };

  list.innerHTML = records.map(h => {
    const ic    = iconMap[h.type]  || iconMap.earn;
    const amtCls = amtMap[h.type] || 'amount-earn';
    const amtStr = h.amount >= 0 ? `+${h.amount} 點` : `${h.amount} 點`;
    const dateStr = h.createdAt ? h.createdAt.slice(0,10) : '—';
    return `
      <div class="history-item">
        <div class="history-icon ${ic.cls}">${ic.emoji}</div>
        <div class="history-info">
          <div class="history-reason">${escHtml(h.reason || '點數異動')}</div>
          <div class="history-date">${escHtml(dateStr)}</div>
        </div>
        <div class="history-amount ${amtCls}">${escHtml(amtStr)}</div>
      </div>`;
  }).join('');
}

/* ── 初始化 ── */
(function() {
  const user = getCurrentUser();
  if (!user) { window.location.href = 'login.html'; return; }
  renderNav();
  renderFooter();
  renderBalance();
  renderProgress();
  renderCoupons();
  renderHistory();
})();
</script>
</body>
</html>
