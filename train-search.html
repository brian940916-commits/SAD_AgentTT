<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent TT — 車次查詢</title>
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    body { background: var(--color-bg); }

    /* ── Hero 搜尋列 ── */
    .search-hero {
      background: linear-gradient(135deg, #2C4A3E 0%, #1A3A2E 100%);
      padding: 40px 0 0;
      margin-bottom: 0;
    }
    .search-hero-title {
      text-align: center;
      color: #FAF6EC;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .search-hero-sub {
      text-align: center;
      color: #C5B886;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 28px;
    }
    .search-box {
      background: #fff;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 28px 32px 24px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    }
    .search-row {
      display: grid;
      grid-template-columns: 1fr 44px 1fr 180px 140px 120px;
      gap: 12px;
      align-items: end;
      margin-bottom: 0;
    }
    .search-field label {
      display: block;
      font-size: 11px;
      color: var(--color-text-light);
      letter-spacing: 2px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .search-field select,
    .search-field input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: var(--font-main);
      color: var(--color-text-main);
      background: var(--color-bg);
      outline: none;
      transition: border-color .15s;
    }
    .search-field select:focus,
    .search-field input:focus { border-color: var(--color-primary); }
    .swap-btn {
      width: 44px; height: 44px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: var(--color-primary);
      transition: all .15s;
      align-self: end;
      margin-bottom: 0;
    }
    .swap-btn:hover { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .search-btn {
      padding: 10px 20px;
      background: var(--color-accent-red);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-main);
      cursor: pointer;
      letter-spacing: 1px;
      align-self: end;
      transition: background .15s;
    }
    .search-btn:hover { background: #B04540; }

    /* ── 進階篩選 ── */
    .adv-toggle-bar {
      background: #fff;
      padding: 12px 32px;
      border-top: 1px solid var(--color-border-light);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .adv-toggle-btn {
      font-size: 13px;
      color: var(--color-text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      font-family: var(--font-main);
      padding: 0;
    }
    .adv-toggle-btn:hover { color: var(--color-primary); }
    .adv-panel {
      background: #F9F7F2;
      border-top: 1px solid var(--color-border-light);
      padding: 16px 32px;
      display: none;
    }
    .adv-panel.open { display: block; }
    .adv-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .adv-group label.group-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-light);
      letter-spacing: 2px;
      display: block;
      margin-bottom: 8px;
    }
    .check-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--color-text-sub);
      cursor: pointer;
    }
    .check-row input { cursor: pointer; accent-color: var(--color-primary); }

    /* ── 主體 ── */
    .main-wrap {
      background: #F2EFE5;
      min-height: 60vh;
      padding-bottom: 60px;
    }
    .results-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    /* 轉乘提示橫幅 */
    .transfer-banner {
      background: #FFF8E6;
      border: 1.5px solid #E8C547;
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }
    .transfer-banner-icon { font-size: 20px; line-height: 1; }
    .transfer-banner-text { font-size: 13px; color: #7A5A1A; line-height: 1.7; }
    .transfer-banner-text strong { color: #5A3A0A; }

    /* ── 組合卡片 ── */
    .combo-card {
      background: #fff;
      border: 1.5px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 14px;
      transition: box-shadow .15s, border-color .15s;
    }
    .combo-card:hover { box-shadow: 0 4px 16px rgba(44,74,62,0.12); border-color: var(--color-border); }
    .combo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .combo-total-time {
      font-size: 13px;
      color: var(--color-text-sub);
    }
    .combo-total-price {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-accent-red);
    }
    .combo-total-price small { font-size: 12px; font-weight: 400; color: var(--color-text-light); margin-left: 2px; }
    .leg-row {
      display: grid;
      grid-template-columns: 80px 1fr 100px 80px;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-top: 1px dashed var(--color-border-light);
    }
    .leg-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .leg-badge.leg1 { background: var(--color-primary); color: #fff; }
    .leg-badge.leg2 { background: var(--color-accent-yellow); color: var(--color-primary); }
    .leg-info {}
    .leg-train-name { font-size: 13px; font-weight: 600; color: var(--color-text-main); }
    .leg-train-no { font-size: 11px; color: var(--color-text-light); }
    .leg-times {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .leg-time { font-size: 16px; font-weight: 700; color: var(--color-text-main); }
    .leg-duration { font-size: 11px; color: var(--color-text-light); }
    .leg-price { font-size: 14px; font-weight: 600; color: var(--color-primary); text-align: right; }
    .transfer-connector {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      color: var(--color-text-light);
      font-size: 12px;
    }
    .transfer-connector::before,
    .transfer-connector::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border-light);
    }
    .select-combo-btn {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-main);
      cursor: pointer;
      letter-spacing: 1px;
      transition: background .15s;
    }
    .select-combo-btn:hover { background: var(--color-primary-dark); }

    /* ── 普通班次卡片 ── */
    .train-card {
      background: #fff;
      border: 1.5px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 100px 1fr 120px 100px 120px;
      gap: 12px;
      align-items: center;
      transition: box-shadow .15s;
    }
    .train-card:hover { box-shadow: 0 4px 16px rgba(44,74,62,0.1); }
    .train-type-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
    }
    .type-express { background: #C4514A; color: #fff; }
    .type-fast    { background: #2C4A3E; color: #fff; }
    .type-local   { background: #E8C547; color: #2C4A3E; }
    .type-pukuai  { background: #7A9456; color: #fff; }
    .train-no { font-size: 12px; color: var(--color-text-light); margin-top: 4px; }
    .train-time-col { display: flex; align-items: center; gap: 14px; }
    .train-time { font-size: 20px; font-weight: 700; color: var(--color-text-main); }
    .train-arrow { color: var(--color-text-light); font-size: 14px; }
    .train-duration { font-size: 12px; color: var(--color-text-light); }
    .train-price-col { font-size: 18px; font-weight: 700; color: var(--color-accent-red); text-align: right; }
    .train-price-col small { font-size: 11px; font-weight: 400; color: var(--color-text-light); }
    .book-btn {
      padding: 9px 16px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-main);
      cursor: pointer;
      transition: background .15s;
    }
    .book-btn:hover { background: var(--color-primary-dark); }

    /* ── 小站推薦 ── */
    .station-rec {
      background: var(--color-primary);
      color: #FAF6EC;
      padding: 20px 32px;
    }
    .station-rec-title { font-size: 13px; letter-spacing: 2px; opacity: .7; margin-bottom: 12px; }
    .station-chips { display: flex; gap: 10px; flex-wrap: wrap; }
    .station-chip {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    .station-chip:hover { background: rgba(255,255,255,0.22); }

    /* ── 結果標題 ── */
    .results-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-text-main);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--color-border-light);
    }
    .results-count { font-weight: 400; color: var(--color-text-light); font-size: 13px; margin-left: 8px; }

    /* ── 空結果 ── */
    .no-result {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-light);
    }
    .no-result .no-result-icon { font-size: 48px; margin-bottom: 16px; }

    /* ── 等候提示 ── */
    .wait-hint {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-light);
    }
    .wait-hint .icon { font-size: 56px; margin-bottom: 16px; }

    @media (max-width: 768px) {
      .search-box { padding: 20px 16px 16px; }
      .search-row { grid-template-columns: 1fr 44px 1fr; }
      .search-row > :nth-child(4),
      .search-row > :nth-child(5),
      .search-row > :nth-child(6) { grid-column: 1 / -1; }
      .adv-toggle-bar { padding: 12px 16px; }
      .adv-panel { padding: 16px; }
      .adv-grid { grid-template-columns: 1fr; }
      .results-wrap { padding: 20px 16px; }
      .combo-card { padding: 16px; }
      .leg-row { grid-template-columns: 60px 1fr; row-gap: 6px; }
      .leg-times { grid-column: 1 / -1; }
      .leg-price { text-align: left; }
      .train-card { grid-template-columns: 80px 1fr; row-gap: 8px; }
      .train-card .train-duration { display: none; }
      .train-card .train-price-col { text-align: left; font-size: 16px; }
      .train-card .book-btn { grid-column: 1 / -1; }
      .stops-row { flex-wrap: wrap; gap: 4px; }
    }

    /* ── 列車狀態標籤 ── */
    .train-status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 5px; display: inline-block; }
    .status-ontime  { background: #E8F5E9; color: #2E7D32; }
    .status-delayed { background: #FFF3E0; color: #E65100; }
    .status-passed  { background: #EEEEEE; color: #757575; }

    /* ── 剩餘座位 ── */
    .seats-info { font-size: 12px; color: var(--color-text-sub); margin-top: 4px; }
    .seats-info.warn { color: #C4514A; font-weight: 700; }

    /* ── 停靠站展開列 ── */
    .train-card-outer { margin-bottom: 10px; }
    .train-card-outer .train-card { margin-bottom: 0; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .stops-row {
      background: #F7F5F0; border: 1.5px solid var(--color-border-light); border-top: 1px solid #E8E3D4;
      padding: 6px 20px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .stops-row:not(.open-row) { border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
    .stops-row.open-row { border-bottom: none; }
    .stops-toggle-btn { font-size: 12px; color: var(--color-primary); background: none; border: none; font-family: var(--font-main); cursor: pointer; padding: 0; }
    .stops-panel { display: none; border: 1.5px solid var(--color-border-light); border-top: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); background: #fff; padding: 10px 20px 14px; }
    .stops-panel.open { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }
    .stop-item { font-size: 13px; color: var(--color-text-main); }
    .stop-sep  { font-size: 11px; color: var(--color-text-light); }

    /* ── 最優惠票種建議 ── */
    .suggest-banner {
      background: #E8F4ED; border: 1.5px solid #A8D4B8; border-radius: var(--radius-lg);
      padding: 14px 18px; display: flex; align-items: flex-start; gap: 12px;
      margin-bottom: 16px;
    }
    .suggest-icon { font-size: 22px; line-height: 1.2; flex-shrink: 0; }
    .suggest-title { font-size: 13px; font-weight: 700; color: var(--color-primary); margin-bottom: 4px; }
    .suggest-text { font-size: 13px; color: #2C6B4A; }
    .suggest-discount {
      background: var(--color-primary); color: #fff;
      font-size: 11px; font-weight: 700; padding: 1px 7px;
      border-radius: 12px; margin-left: 6px; vertical-align: middle;
    }
  </style>
</head>
<body>
<div id="navbar-container"></div>

<!-- ── 搜尋區 ── -->
<div class="search-hero">
  <div style="display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;">
    <div>
      <div class="search-hero-title">🚂 台鐵車次查詢</div>
      <div class="search-hero-sub">中彰投小站 × 集集線轉乘</div>
    </div>
    <a href="train-tickets.html" style="padding:8px 18px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.5);border-radius:var(--radius-md);color:#fff;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap;transition:background .2s;" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'">🎫 我的票券</a>
  </div>
  <div class="search-box" style="max-width:1000px;margin:0 auto;">
    <div class="search-row">
      <div class="search-field">
        <label for="from-station">出發站</label>
        <select id="from-station"></select>
      </div>
      <button class="swap-btn" onclick="swapStations()" title="互換">⇄</button>
      <div class="search-field">
        <label for="to-station">到達站</label>
        <select id="to-station"></select>
      </div>
      <div class="search-field">
        <label for="travel-date">乘車日期</label>
        <input type="date" id="travel-date"/>
      </div>
      <div class="search-field">
        <label for="travel-time">出發時間</label>
        <input type="time" id="travel-time" value="08:00"/>
      </div>
      <button class="search-btn" onclick="searchTrains()">查詢車次</button>
    </div>
  </div>

  <!-- 進階篩選列 -->
  <div class="adv-toggle-bar" style="max-width:1000px;margin:0 auto;">
    <button class="adv-toggle-btn" onclick="toggleAdv()" id="adv-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
      進階篩選
    </button>
    <span style="font-size:12px;color:var(--color-text-light);">轉乘、車種、座位偏好</span>
  </div>
  <div class="adv-panel" id="adv-panel" style="max-width:1000px;margin:0 auto;">
    <div class="adv-grid">
      <div class="adv-group">
        <label class="group-label">乘車方式</label>
        <label class="check-row"><input type="checkbox" id="pref-transfer" checked> 允許轉乘</label>
      </div>
      <div class="adv-group">
        <label class="group-label">車種偏好</label>
        <label class="check-row"><input type="checkbox" id="type-taroko" checked> 太魯閣/普悠瑪</label>
        <label class="check-row"><input type="checkbox" id="type-express" checked> 自強號</label>
        <label class="check-row"><input type="checkbox" id="type-juguang" checked> 莒光號</label>
        <label class="check-row"><input type="checkbox" id="type-local" checked> 區間車</label>
      </div>
      <div class="adv-group">
        <label class="group-label">座位偏好</label>
        <label class="check-row"><input type="radio" name="seat-pref" id="seat-window" checked> 靠窗</label>
        <label class="check-row"><input type="radio" name="seat-pref" id="seat-aisle"> 靠走道</label>
        <label class="check-row"><input type="radio" name="seat-pref" id="seat-any"> 無偏好</label>
      </div>
    </div>
  </div>
</div>

<!-- ── 結果區 ── -->
<div class="main-wrap">
  <div class="results-wrap">
    <div id="suggestion-area" style="display:none;"></div>
    <div id="results-area">
      <div class="wait-hint">
        <div class="icon">🛤️</div>
        <div style="font-size:16px;font-weight:600;color:#6B6354;margin-bottom:8px;">請選擇出發站與到達站</div>
        <div style="font-size:13px;">輸入乘車資訊後點擊「查詢車次」</div>
      </div>
    </div>
  </div>
</div>

<!-- ── 小站推薦 ── -->
<div class="station-rec">
  <div style="max-width:1000px;margin:0 auto;">
    <div class="station-rec-title">🏮 中彰投嚴選小站，搭車直達</div>
    <div class="station-chips">
      <div class="station-chip" onclick="quickPick('彰化','集集')">彰化 → 集集 🌾</div>
      <div class="station-chip" onclick="quickPick('彰化','車埕')">彰化 → 車埕 🪵</div>
      <div class="station-chip" onclick="quickPick('彰化','水里')">彰化 → 水里 💧</div>
      <div class="station-chip" onclick="quickPick('台中','集集')">台中 → 集集 🚂</div>
      <div class="station-chip" onclick="quickPick('員林','集集')">員林 → 集集 🌿</div>
      <div class="station-chip" onclick="quickPick('二水','車埕')">二水 → 車埕 🎋</div>
    </div>
  </div>
</div>

<div id="footer-container"></div>

<script src="shared-data.js"></script>
<script src="shared-nav.js"></script>
<script>
/* ── 車站資料 ── */
const ALL_STATIONS = [
  '台中', '新烏日', '豐原', '彰化', '花壇', '大村', '員林', '社頭', '田中', '二水',
  '集集', '龍泉', '水里', '車埕'
];
const JIJI_LINE = ['集集', '龍泉', '水里', '車埕']; // 集集線站點（不含二水）

/* ── 縱貫線車次資料（彰化方向 → 二水）── */
const WEST_TRAINS = [
  { trainNo: '4008', type: '區間車', typeKey: 'local',   departH: 6,  departM: 20, durationMin: 32, price: 63 },
  { trainNo: '4012', type: '區間車', typeKey: 'local',   departH: 7,  departM: 10, durationMin: 32, price: 63 },
  { trainNo: '109',  type: '自強號', typeKey: 'express', departH: 7,  departM: 45, durationMin: 20, price: 107 },
  { trainNo: '4016', type: '區間車', typeKey: 'local',   departH: 8,  departM: 5,  durationMin: 32, price: 63 },
  { trainNo: '1129', type: '莒光號', typeKey: 'juguang', departH: 8,  departM: 40, durationMin: 22, price: 90 },
  { trainNo: '4020', type: '區間車', typeKey: 'local',   departH: 9,  departM: 15, durationMin: 32, price: 63 },

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pad2(n) { return String(n).padStart(2, '0'); }

function fmtTime(h, m) {
  return `${pad2(h)}:${pad2(m)}`;
}

function addMinutes(h, m, mins) {
  const total = h * 60 + m + mins;
  return { h: Math.floor(total / 60) % 24, m: total % 60 };
}

function timeToMins(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}

function isJijiDest(station) {
  return JIJI_LINE.includes(station);
}

function typeBadgeHTML(type, key) {
  const cls = { express:'type-express', juguang:'type-fast', local:'type-local', pukuai:'type-pukuai' }[key] || 'type-local';
  return `<span class="train-type-badge ${cls}">${escHtml(type)}</span>`;
}

/* ── 主查詢邏輯 ── */
function searchTrains() {
  const from = document.getElementById('from-station').value;
  const to   = document.getElementById('to-station').value;
  const date = document.getElementById('travel-date').value;
  const timeStr = document.getElementById('travel-time').value || '00:00';

  if (!date) {
    alert('請選擇乘車日期');
    return;
  }
  if (from === to) {
    alert('出發站與到達站不可相同');
    return;
  }

  const afterMins   = timeToMins(timeStr);
  const allowTransfer = document.getElementById('pref-transfer').checked;
  const area = document.getElementById('results-area');

  if (isJijiDest(to)) {
    if (!allowTransfer && from !== '二水') {
      area.innerHTML = emptyHTML('已關閉「允許轉乘」，此路線需在二水站轉乘，無法顯示結果');
    } else {
      renderJijiResults(from, to, date, afterMins, area);
    }
  } else if (isJijiDest(from)) {
    if (!allowTransfer) {
      area.innerHTML = emptyHTML('已關閉「允許轉乘」，此路線需在二水站轉乘，無法顯示結果');
    } else {
      renderJijiReverseResults(from, to, date, afterMins, area);
    }
  } else {
    renderDirectResults(from, to, date, afterMins, area);
  }
  showTicketSuggestion();
}

/* 集集線（正向：一般站 → 集集線）*/
function renderJijiResults(from, to, date, afterMins, area) {
  // 如果出發站本身是二水，直接顯示集集線班次
  if (from === '二水') {
    const trains = JIJI_TRAINS.filter(t => timeToMins(t.depart) >= afterMins);
    if (!trains.length) { area.innerHTML = emptyHTML('今日此時段後已無班次'); return; }
    area.innerHTML = `
      <div class="results-title">二水 → ${escHtml(to)} 直達車 <span class="results-count">${trains.length} 班</span></div>
      ${trains.map(t => jijiCardHTML(t, from, to, date)).join('')}`;
    return;
  }

  // 需要從縱貫線換集集線
  const leg1Trains = WEST_TRAINS.filter(t => t.departH * 60 + t.departM >= afterMins);
  if (!leg1Trains.length) { area.innerHTML = emptyHTML('今日此時段後已無班次'); return; }

  // 產生轉乘組合
  const combos = [];
  leg1Trains.forEach(leg1 => {
    const leg1Arrive = addMinutes(leg1.departH, leg1.departM, leg1.durationMin);
    const leg1ArriveMin = leg1Arrive.h * 60 + leg1Arrive.m;
    const leg2 = JIJI_TRAINS.find(t => timeToMins(t.depart) >= leg1ArriveMin + 5);
    if (leg2) combos.push({ leg1, leg1Arrive, leg2 });
  });

  if (!combos.length) { area.innerHTML = emptyHTML('今日無合適轉乘組合'); return; }

  const leg1Price = leg1Trains[0].price;
  const leg2Price = JIJI_TRAINS[0].price[to] || 113;
  const total = leg1Price + leg2Price; // 但各組合不同票價，以實際計算

  area.innerHTML = `
    <div class="transfer-banner">
      <div class="transfer-banner-icon">🔄</div>
      <div class="transfer-banner-text">
        <strong>${escHtml(from)} → ${escHtml(to)}</strong> 需在 <strong>二水站</strong> 轉乘集集線。<br>
        集集線為台鐵支線，不開放對號座預訂，以對號票價計算自由座費用。
      </div>
    </div>
    <div class="results-title">轉乘組合 <span class="results-count">${combos.length} 種</span></div>
    ${combos.slice(0,6).map(c => comboCardHTML(c, from, to, date)).join('')}`;
}

/* 集集線（反向：集集線 → 一般站）*/
function renderJijiReverseResults(from, to, date, afterMins, area) {
  const trains = JIJI_TRAINS.filter(t => timeToMins(t.depart) >= afterMins);
  if (!trains.length) { area.innerHTML = emptyHTML('今日此時段後已無班次'); return; }
  area.innerHTML = `

      <div class="transfer-banner-icon">🔄</div>
      <div class="transfer-banner-text">
        <strong>${escHtml(from)}</strong> 搭集集線至 <strong>二水站</strong>，再轉搭縱貫線前往 <strong>${escHtml(to)}</strong>。
      </div>

    ${trains.map(t => jijiCardHTML(t, from, '二水', date)).join('')}`;
}

/* 普通直達 */

/* ── 假資料：列車狀態 & 剩餘座位 ── */
function hashNum(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xfffff;
  return h;
}
function getTrainStatus(trainNo, dH, dM) {
  const now  = new Date();
  const nowM = now.getHours() * 60 + now.getMinutes();
  if (dH * 60 + dM < nowM) return { label:'已過站', cls:'status-passed', passed:true };
  const h = hashNum(trainNo);
  if (h % 5 === 0) return { label:'誤點 ' + ((h % 3 + 1) * 5) + ' 分', cls:'status-delayed', passed:false };
  return { label:'準點', cls:'status-ontime', passed:false };
}
function getSeatsNum(trainNo) { return (hashNum(trainNo) % 56) + 5; }
function seatsHTML(trainNo) {
  const n = getSeatsNum(trainNo);
  return n < 10
    ? `<div class="seats-info warn">剩餘 ${n} 座</div>`
    : `<div class="seats-info">剩餘 ${n} 座</div>`;
}

function directCardHTML(t, from, to, date) {
  const arrive    = addMinutes(t.departH, t.departM, t.durationMin);
  const departStr = fmtTime(t.departH, t.departM);
  const arriveStr = fmtTime(arrive.h, arrive.m);
  const params = new URLSearchParams({
    from, to, date,
    trainNo1: t.trainNo, depart1: departStr, arrive1: arriveStr, price1: t.price,
    trainType1: t.type, total: t.price
  });
  const st    = getTrainStatus(t.trainNo, t.departH, t.departM);
  const stops = WEST_STOPS[t.typeKey] || WEST_STOPS.local;
  const sid   = 'd' + t.trainNo;
  const bookBtn = st.passed
    ? `<button class="book-btn" disabled style="opacity:.45;cursor:not-allowed;">已過站</button>`
    : `<button class="book-btn" onclick="window.location.href='train-booking.html?${params.toString()}'">訂票</button>`;
  return `
    <div class="train-card-outer">
      <div class="train-card">
        <div>
          ${typeBadgeHTML(t.type, t.typeKey)}
          <div class="train-no">${escHtml(t.trainNo)}</div>
          <span class="train-status ${st.cls}">${st.label}</span>
        </div>
        <div class="train-time-col">
          <span class="train-time">${escHtml(departStr)}</span>
          <svg width="18" height="12" viewBox="0 0 24 12"><path d="M0 6h20m-4-4l4 4-4 4" stroke="#8A8073" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
          <span class="train-time">${escHtml(arriveStr)}</span>
        </div>
        <div class="train-duration">約 ${t.durationMin} 分</div>
        <div class="train-price-col">NT$${t.price}<br><small>/人</small>${seatsHTML(t.trainNo)}</div>
        ${bookBtn}
      </div>
      <div class="stops-row" id="sr-${sid}" onclick="toggleStops('${sid}')">
        <span style="font-size:12px;color:var(--color-text-sub);">縱貫線停靠站</span>
        <button class="stops-toggle-btn" id="sb-${sid}">▼ 查看停靠站</button>
      </div>
      <div class="stops-panel" id="sp-${sid}">${stopsListHTML(stops)}</div>
    </div>`;
}

function showTicketSuggestion() {
  const area = document.getElementById('suggestion-area');
  if (!area) return;

  var suggestName = '一般票';
  var suggestDiscount = '';
  var suggestReason = '適合一般旅客，無需出示任何證件';

  if (typeof getCurrentUser === 'function') {
    var user = getCurrentUser();
    if (user && typeof getTicketsByUser === 'function') {
      var tickets = getTicketsByUser(user.id);
      if (tickets.length) {
        var counts = {};
        tickets.forEach(function(t) {
          if (t.ticketType && t.ticketType !== 'general') {
            counts[t.ticketType] = (counts[t.ticketType] || 0) + 1;
          }
        });
        var sorted = Object.entries(counts).sort(function(a, b) { return b[1] - a[1]; });
        if (sorted.length) {
          var typeMap = {
            student:  { name:'學生票', discount:'88折', reason:'依您過往搭乘紀錄，建議使用學生票（需出示學生證）' },
            senior:   { name:'敬老票', discount:'5折',  reason:'依您過往搭乘紀錄，建議使用敬老票（65歲以上）' },
            disabled: { name:'愛心票', discount:'60折', reason:'依您過往搭乘紀錄，建議使用愛心票（需出示身心障礙手冊）' },
            child:    { name:'兒童票', discount:'7折',  reason:'依您過往搭乘紀錄，建議使用兒童票（未滿12歲）' },
          };
          var best = sorted[0][0];
          if (typeMap[best]) {
            suggestName     = typeMap[best].name;
            suggestDiscount = typeMap[best].discount;
            suggestReason   = typeMap[best].reason;
          }
        }
      }
    }
  }

  var discTag = suggestDiscount
    ? '<span class="suggest-discount">' + escHtml(suggestDiscount) + '</span>'
    : '';
  area.innerHTML =
    '<div class="suggest-banner">' +
    '<div class="suggest-icon">💡</div>' +
    '<div>' +
    '<div class="suggest-title">自動篩選最優惠票種</div>' +
    '<div class="suggest-text">建議選用 <strong>' + escHtml(suggestName) + '</strong>' + discTag + '　' + escHtml(suggestReason) + '</div>' +
    '</div>' +
    '</div>';
  area.style.display = 'block';
}

function emptyHTML(msg) {
  return `<div class="no-result"><div class="no-result-icon">🔍</div><div style="font-size:15px;font-weight:600;margin-bottom:8px;">${escHtml(msg)}</div><div style="font-size:13px;">請嘗試更早的出發時間，或選擇其他日期</div></div>`;
}

/* ── 初始化 ── */
(function init() {
  buildStationSelects();
  setDefaultDate();
  renderNav();
  renderFooter();

  // 讀 URL 參數（從首頁快速搜尋跳入）
  const sp = new URLSearchParams(location.search);
  if (sp.get('from')) document.getElementById('from-station').value = sp.get('from');
  if (sp.get('to'))   document.getElementById('to-station').value   = sp.get('to');
  if (sp.get('date')) document.getElementById('travel-date').value  = sp.get('date');
  if (sp.get('from') && sp.get('to')) searchTrains();
})();
</script>
